<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cemilan Cepuluh POS Enterprise</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { primary: '#FF6B35', 'primary-dark': '#E85A28', secondary: '#1E293B', success: '#10B981', background: '#F8FAFC', surface: '#FFFFFF' },
          boxShadow: { soft: '0 4px 20px -2px rgba(0, 0, 0, 0.05)', glass: '0 8px 32px 0 rgba(31, 38, 135, 0.07)' }
        }
      }
    };
  </script>

  <style>
    html, body { margin: 0; background: #E2E8F0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    #app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    [v-cloak] { display: none; }
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { scrollbar-width: none; }
    .animate-fade-in { animation: fadeIn .25s ease-out forwards; }
    .animate-slide-up { animation: slideUp .25s cubic-bezier(.16,1,.3,1) forwards; }
    .animate-pop { animation: pop .18s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pop { from { transform: scale(.90); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes growBar { from { width: 0%; } }
    .animate-bar { animation: growBar 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .glass-nav { background: rgba(255,255,255,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,.35); }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #FF6B35; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>

<body class="text-secondary antialiased">
<div id="app" v-cloak class="w-full max-w-md mx-auto bg-background h-screen relative shadow-2xl overflow-hidden flex flex-col">

  <div v-if="isLoadingSystem" class="absolute inset-0 bg-white z-[60] flex flex-col items-center justify-center animate-fade-in">
    <div class="loader mb-4"></div>
    <p class="text-sm font-semibold text-gray-500 animate-pulse">Menghubungkan ke Cloud...</p>
    <span class="mt-8 text-[10px] text-gray-400">WarungKas v6.4 Enterprise</span>
  </div>

  <div v-else-if="systemError" class="absolute inset-0 bg-white z-[60] flex flex-col items-center justify-center p-6 text-center animate-fade-in">
    <i class="ph-fill ph-warning-circle text-red-500 text-7xl mb-4"></i>
    <h2 class="text-xl font-bold text-secondary mb-2">Database Error</h2>
    <p class="text-xs text-gray-500 mb-4 bg-red-50 p-4 rounded-xl border border-red-100 text-left font-mono break-words w-full">{{ systemError }}</p>
    <button @click="retryLoad" class="bg-primary text-white font-bold px-8 py-3 rounded-2xl shadow-md active:scale-95 transition-transform flex items-center gap-2 mb-4">
      <i class="ph-bold ph-arrows-clockwise"></i> Coba Lagi
    </button>
  </div>

  <div v-else-if="!isLoggedIn" class="absolute inset-0 bg-primary z-[55] flex flex-col items-center justify-center px-6 animate-fade-in text-white">
    <img v-if="storeProfile.logo" :src="storeProfile.logo" class="w-24 h-24 rounded-3xl mb-4 shadow-glass object-cover border-4 border-white/20 animate-pop" />
    <div v-else class="w-20 h-20 bg-white text-primary rounded-3xl flex items-center justify-center text-4xl mb-6 shadow-glass animate-pop"><i class="ph-fill ph-storefront"></i></div>
    
    <h1 class="text-3xl font-extrabold tracking-tight mb-2">{{ storeProfile.name || 'WarungKas' }}</h1>
    <p class="text-white/80 mb-8 text-center text-sm">Masukan PIN (Admin / Kasir).</p>

    <div class="flex gap-4 mb-8"><div v-for="i in 4" :key="i" class="w-4 h-4 rounded-full transition-all duration-300" :class="pin.length >= i ? 'bg-white scale-110 shadow-lg' : 'bg-white/30'"></div></div>

    <div class="grid grid-cols-3 gap-4 w-full max-w-[280px]">
      <button v-for="n in 9" :key="n" @click="appendPin(n)" class="h-16 rounded-full text-2xl font-semibold hover:bg-white/10 active:bg-white/20 transition-colors bg-white/5">{{ n }}</button>
      <button @click="clearPin" class="h-16 rounded-full text-2xl font-semibold hover:bg-white/10 active:bg-white/20 transition-colors flex items-center justify-center text-white/70 bg-white/5"><i class="ph-bold ph-x"></i></button>
      <button @click="appendPin(0)" class="h-16 rounded-full text-2xl font-semibold hover:bg-white/10 active:bg-white/20 transition-colors bg-white/5">0</button>
      <button @click="removePin" class="h-16 rounded-full text-2xl font-semibold hover:bg-white/10 active:bg-white/20 transition-colors flex items-center justify-center text-white/70 bg-white/5"><i class="ph-bold ph-backspace"></i></button>
    </div>

    <p v-if="loginError" class="mt-6 text-red-200 bg-red-900/30 px-4 py-2 rounded-xl text-sm animate-fade-in">{{ loginError }}</p>
    <p v-else class="mt-6 text-white/50 text-xs">Aplikasi akan Auto-Lock jika tidak aktif</p>
  </div>

  <template v-else>
    <header class="bg-surface px-5 py-4 flex justify-between items-center sticky top-0 z-30 border-b border-gray-100 shadow-sm">
      <div class="flex items-center gap-3">
        <img v-if="storeProfile.logo" :src="storeProfile.logo" class="w-10 h-10 rounded-xl object-cover" />
        <div v-else class="bg-primary text-white p-2.5 rounded-xl"><i class="ph-fill ph-storefront text-lg"></i></div>
        <div>
          <h1 class="font-bold text-secondary tracking-tight leading-tight">{{ storeProfile.name || 'WarungKas' }}</h1>
          <div class="mt-0.5 flex items-center gap-1.5">
            <span v-if="isOnline" class="inline-flex items-center gap-1 bg-green-100 text-green-700 text-[9px] px-1.5 py-0.5 rounded-md font-bold"><span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Cloud</span>
            <span v-else class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-[9px] px-1.5 py-0.5 rounded-md font-bold"><i class="ph-bold ph-wifi-slash"></i> Offline</span>
            <span class="inline-flex items-center gap-1 bg-blue-100 text-blue-700 text-[9px] px-1.5 py-0.5 rounded-md font-bold uppercase"><i class="ph-bold ph-user"></i> {{ userRole }}</span>
          </div>
        </div>
      </div>
      <div class="flex items-center gap-3 text-right">
        <div class="hidden sm:block">
          <p class="text-[10px] text-gray-400 font-medium uppercase tracking-wider">Jam Realtime</p>
          <p class="text-sm font-bold text-primary">{{ liveClock }}</p>
        </div>
        <button @click="logout" class="bg-red-50 text-red-500 p-2.5 rounded-xl hover:bg-red-100 active:scale-90 transition-all shadow-sm">
          <i class="ph-bold ph-power text-xl"></i>
        </button>
      </div>
    </header>

    <main class="flex-1 min-h-0 scroll-area pb-[92px]">
      <div class="p-5">

        <div v-if="currentTab === 'dashboard'" class="space-y-5 animate-fade-in">
          
          <div class="bg-blue-50 border border-blue-100 p-3.5 rounded-2xl flex items-start gap-3 shadow-sm">
            <div class="bg-blue-100 text-blue-600 p-2 rounded-xl shrink-0"><i class="ph-fill ph-lightbulb text-xl"></i></div>
            <div class="flex-1">
              <p class="text-xs font-extrabold text-blue-800 mb-0.5">Insight Hari Ini</p>
              <p class="text-[11px] text-blue-600 font-medium leading-relaxed">{{ dashboardInsight }}</p>
            </div>
            <button v-if="isAdmin" @click="closeShift" class="bg-white border border-blue-200 text-blue-600 text-[10px] font-bold px-2 py-1.5 rounded-lg shrink-0 active:scale-90 flex flex-col items-center gap-1">
              <i class="ph-bold ph-printer text-sm"></i> Rekap Shift
            </button>
          </div>

          <div class="bg-gradient-to-br from-primary to-primary-dark p-6 rounded-3xl shadow-lg text-white relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-white opacity-10"></div>
            <div class="relative z-10">
              <p class="text-sm font-medium text-white/80 mb-1">Omzet Penjualan</p>
              <h2 class="text-3xl font-extrabold tracking-tight mb-4">Rp {{ formatCurrency(dashboardStats.omzet) }}</h2>
              <div class="flex gap-2 flex-wrap" v-if="isAdmin">
                <button @click="setReportFilter('all')" :class="reportFilter.mode==='all' ? 'bg-white text-primary' : 'bg-white/20 text-white'" class="text-xs font-bold px-3 py-1 rounded-full transition-colors">Semua</button>
                <button @click="setReportFilter('today')" :class="reportFilter.mode==='today' ? 'bg-white text-primary' : 'bg-white/20 text-white'" class="text-xs font-bold px-3 py-1 rounded-full transition-colors">Hari Ini</button>
                <button @click="openDateFilter()" class="text-xs font-bold px-3 py-1 rounded-full transition-colors bg-white/20 text-white"><i class="ph-bold ph-calendar"></i> Tanggal</button>
              </div>
              <div v-else class="text-xs text-white/70 bg-white/10 px-3 py-1.5 rounded-xl inline-block">Data Hari Ini</div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div @click="isAdmin ? changeTab('laporan') : null" class="bg-surface p-4 rounded-2xl shadow-soft border border-gray-50 flex flex-col gap-2 animate-slide-up" :class="{'cursor-pointer hover:bg-gray-50': isAdmin}">
              <div class="h-8 w-8 rounded-full bg-green-50 text-green-600 flex items-center justify-center"><i class="ph-bold ph-target"></i></div>
              <p class="text-xs text-gray-400 font-medium">Laba Kotor</p>
              <p v-if="isAdmin" class="font-bold text-secondary">Rp {{ formatCurrency(dashboardStats.labaKotor) }}</p>
              <p v-else class="font-bold text-gray-300 text-xs italic">Akses Terkunci</p>
            </div>
            <div @click="isAdmin ? changeTab('laporan') : null" class="bg-surface p-4 rounded-2xl shadow-soft border border-gray-50 flex flex-col gap-2 animate-slide-up" :class="{'cursor-pointer hover:bg-gray-50': isAdmin}" style="animation-delay: 0.1s;">
              <div class="h-8 w-8 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center"><i class="ph-bold ph-chart-line-down"></i></div>
              <p class="text-xs text-gray-400 font-medium">Pengeluaran</p>
              <p class="font-bold text-secondary">Rp {{ formatCurrency(dashboardStats.totalPengeluaran) }}</p>
            </div>
            <div @click="isAdmin ? changeTab('laporan') : null" class="bg-surface p-4 rounded-2xl shadow-soft border border-gray-50 flex flex-col gap-2 animate-slide-up" :class="{'cursor-pointer hover:bg-gray-50': isAdmin}" style="animation-delay: 0.2s;">
              <div class="h-8 w-8 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center"><i class="ph-bold ph-receipt"></i></div>
              <p class="text-xs text-gray-400 font-medium">Total Transaksi</p>
              <p class="font-bold text-primary">{{ dashboardStats.totalTrx }} Struk &rarr;</p>
            </div>
            <div @click="isAdmin ? changeTab('laporan') : null" class="bg-surface p-4 rounded-2xl shadow-soft border border-gray-50 flex flex-col gap-2 animate-slide-up" :class="{'cursor-pointer hover:bg-gray-50': isAdmin}" style="animation-delay: 0.3s;">
              <div class="h-8 w-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center"><i class="ph-bold ph-money"></i></div>
              <p class="text-xs text-gray-400 font-medium">Laba Bersih</p>
              <p v-if="isAdmin" class="font-bold" :class="dashboardStats.isLabaMinus ? 'text-red-500' : 'text-success'">Rp {{ formatCurrency(filteredReport.labaBersih) }}</p>
              <p v-else class="font-bold text-gray-300 text-xs italic">Akses Terkunci</p>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3 mt-4 animate-slide-up" style="animation-delay: 0.4s;">
            <button @click="changeTab('kasir')" class="w-full bg-secondary text-white py-4 rounded-2xl font-semibold shadow-glass flex flex-col items-center justify-center gap-1 active:scale-95 transition-all">
              <i class="ph-bold ph-calculator text-2xl"></i> <span class="text-sm">Buka Kasir</span>
            </button>
            <button @click="openExpenseModal()" class="w-full bg-red-50 text-red-600 border border-red-100 py-4 rounded-2xl font-semibold shadow-sm flex flex-col items-center justify-center gap-1 active:scale-95 transition-all">
              <i class="ph-bold ph-hand-coins text-2xl"></i> <span class="text-sm">Pengeluaran</span>
            </button>
          </div>

          <div class="bg-white p-5 rounded-3xl shadow-soft border border-gray-100 animate-slide-up" style="animation-delay: 0.5s;">
            <h3 class="text-sm font-bold text-gray-600 mb-4 flex items-center gap-2"><i class="ph-bold ph-chart-bar text-primary text-lg"></i> Top Produk Terjual (Periode Ini)</h3>
            <div v-if="topSoldToday.length" class="space-y-4">
              <div v-for="(item, idx) in topSoldToday" :key="idx" class="relative">
                <div class="flex justify-between text-xs font-semibold mb-1 text-secondary"><span>{{ item.name }}</span><span class="text-primary">{{ item.qty }} Pcs</span></div>
                <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden"><div class="bg-primary h-2.5 rounded-full animate-bar" :style="{ width: item.pct + '%' }"></div></div>
              </div>
            </div>
            <div v-else class="text-center text-xs text-gray-400 py-6 border border-dashed border-gray-200 rounded-xl">Belum ada penjualan.</div>
          </div>
          
          <div v-if="isAdmin && lowStockProducts.length > 0" class="bg-orange-50 p-5 rounded-3xl shadow-soft border border-orange-100 animate-slide-up" style="animation-delay: 0.6s;">
            <h3 class="text-sm font-bold text-orange-600 mb-3 flex items-center gap-2"><i class="ph-fill ph-warning text-lg"></i> Peringatan Stok Menipis</h3>
            <div class="space-y-2">
              <div v-for="item in lowStockProducts" :key="item.id" class="flex justify-between items-center bg-white p-2 px-3 rounded-xl border border-orange-100">
                <span class="text-xs font-bold text-secondary">{{ item.name }}</span>
                <span class="text-xs font-black text-red-500 bg-red-50 px-2 py-1 rounded-md">{{ item.stock }} Tersisa</span>
              </div>
            </div>
          </div>
        </div>

        <div v-else-if="currentTab === 'kasir'" class="space-y-5 animate-fade-in relative min-h-full">
          <div class="relative">
            <i class="ph-bold ph-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            <input v-model="searchQuery" type="text" placeholder="Cari menu..." class="w-full pl-11 pr-12 py-3 rounded-2xl border border-gray-100 shadow-soft focus:ring-2 focus:ring-primary outline-none text-sm font-medium bg-white transition-all">
            <button v-if="searchQuery" @click="searchQuery = ''" class="absolute right-3 top-2 bg-red-50 text-red-500 p-1.5 rounded-xl active:scale-90 transition-all animate-pop"><i class="ph-bold ph-x text-sm"></i></button>
          </div>

          <div class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
            <button v-for="cat in categories" :key="cat" @click="activeCategory = cat" class="px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap shadow-sm transition-colors" :class="activeCategory===cat ? 'bg-primary text-white' : 'bg-white text-gray-500 border border-gray-100'">{{ cat }}</button>
          </div>

          <div class="grid grid-cols-2 gap-4 pb-32">
            <div v-for="item in filteredProducts" :key="item.id" class="bg-white rounded-3xl shadow-soft border border-gray-50 active:bg-gray-50 cursor-pointer flex flex-col items-center text-center relative animate-pop overflow-hidden min-h-[140px]" :class="{'opacity-50 grayscale': item.stock <= 0}">
              
              <div @click="handleProductClick(item)" class="w-full h-full flex flex-col items-center justify-center p-4 relative">
                <div class="absolute top-2 left-2 text-[9px] font-bold px-1.5 py-0.5 rounded-md" :class="item.stock > 5 ? 'bg-gray-100 text-gray-500' : (item.stock > 0 ? 'bg-orange-100 text-orange-600' : 'bg-red-100 text-red-600')">Stok: {{ item.stock }}</div>
                <div class="text-5xl mb-3 mt-4">{{ item.icon }}</div>
                <h3 class="text-sm font-bold text-secondary leading-tight">{{ item.name }}</h3>
                <p class="text-primary font-extrabold text-sm mt-1">Rp {{ formatCurrency(item.price) }}</p>
                <div v-if="item.stock <= 0" class="absolute inset-0 flex items-center justify-center bg-white/60 backdrop-blur-[1px] z-10"><span class="bg-red-500 text-white font-black text-xs px-3 py-1 rounded-full uppercase tracking-wider transform -rotate-12 border-2 border-white shadow-md">HABIS</span></div>
              </div>

              <div v-if="getCartQtyByBaseId(item.id) > 0 && (!item.variants || item.variants.trim() === '')" class="absolute inset-0 bg-white/95 backdrop-blur-[2px] z-20 flex flex-col items-center justify-center gap-3 animate-fade-in border-2 border-primary rounded-3xl">
                <p class="font-bold text-sm text-secondary px-2 truncate w-full text-center">{{ item.name }}</p>
                <div class="flex items-center gap-3">
                  <button @click.stop="reduceCartByBaseId(item.id)" class="bg-red-100 text-red-600 w-10 h-10 rounded-full flex items-center justify-center shadow-sm active:scale-90 transition-transform"><i class="ph-bold ph-minus text-lg"></i></button>
                  <span class="text-2xl font-black text-primary w-8 text-center">{{ getCartQtyByBaseId(item.id) }}</span>
                  <button @click.stop="handleProductClick(item)" class="bg-green-100 text-green-600 w-10 h-10 rounded-full flex items-center justify-center shadow-sm active:scale-90 transition-transform"><i class="ph-bold ph-plus text-lg"></i></button>
                </div>
              </div>
              
              <div v-if="getCartQtyByBaseId(item.id) > 0 && item.variants && item.variants.trim() !== ''" class="absolute -top-2 -right-2 bg-primary text-white w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shadow-sm z-30 pointer-events-none">{{ getCartQtyByBaseId(item.id) }}</div>
            </div>
            
            <div v-if="!filteredProducts.length" class="col-span-2 text-center py-10 text-gray-400 text-sm">Produk belum tersedia.</div>
          </div>

          <div v-if="cart.length" class="fixed bottom-[88px] left-0 right-0 max-w-md mx-auto px-5 z-20 animate-slide-up">
            <div class="bg-secondary text-white rounded-3xl p-3 shadow-glass flex items-center">
              <button @click.stop="clearCart" class="bg-white/10 hover:bg-red-500/20 text-white hover:text-red-400 p-3 rounded-2xl active:scale-90 transition-all mr-3 flex-shrink-0" title="Batal Transaksi"><i class="ph-bold ph-trash text-xl"></i></button>
              <div class="flex-1 flex justify-between items-center cursor-pointer active:scale-95 transition-transform" @click="showCartModal = true">
                <div class="flex items-center gap-3">
                  <div class="relative"><i class="ph-duotone ph-shopping-cart text-3xl text-primary"></i><span class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-secondary">{{ cartTotalItems }}</span></div>
                  <div><p class="text-xs text-gray-400 font-medium">{{ cartTotalItems }} item</p><p class="font-bold text-lg leading-none">Rp {{ formatCurrency(cartTotal) }}</p></div>
                </div>
                <div class="bg-primary text-white p-2 rounded-xl mr-1"><i class="ph-bold ph-arrow-right text-xl"></i></div>
              </div>
            </div>
          </div>
        </div>

        <div v-else-if="currentTab === 'produk' && isAdmin" class="space-y-4 animate-fade-in">
          <div class="flex justify-between items-center mb-1">
            <h2 class="font-bold text-xl text-secondary">Katalog & Stok</h2>
            <button @click="openProductModal()" class="bg-primary text-white px-3 py-2 rounded-xl shadow-md flex items-center gap-2 text-sm font-bold active:scale-95">
              <i class="ph-bold ph-plus"></i> Menu Baru
            </button>
          </div>

          <div class="relative">
            <i class="ph-bold ph-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            <input v-model="searchQuery" type="text" placeholder="Cari nama menu..." class="w-full pl-11 pr-12 py-3 rounded-2xl border border-gray-200 shadow-sm focus:ring-2 focus:ring-primary outline-none text-sm bg-white transition-all">
            <button v-if="searchQuery" @click="searchQuery = ''" class="absolute right-3 top-2 bg-red-50 text-red-500 p-1.5 rounded-xl active:scale-90 transition-all animate-pop"><i class="ph-bold ph-x text-sm"></i></button>
          </div>

          <div class="space-y-3">
            <div v-for="item in filteredCatalog" :key="item.id" class="bg-white p-4 rounded-2xl shadow-soft border border-gray-50 flex items-center gap-4 animate-slide-up">
              <div class="text-3xl bg-gray-50 h-14 w-14 rounded-2xl flex items-center justify-center relative">
                {{ item.icon }}
                <span v-if="item.stock <= 5" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white animate-pulse"></span>
              </div>
              <div class="flex-1">
                <div class="flex justify-between gap-2">
                  <h3 class="font-bold text-sm text-secondary">{{ item.name }}</h3>
                  <button @click="openProductModal(item)" class="text-gray-400 hover:text-primary"><i class="ph-fill ph-pencil-simple text-lg"></i></button>
                </div>
                <div class="flex items-center gap-3 mt-1">
                  <p class="text-[10px] text-gray-400">Jual <span class="text-primary font-bold text-sm ml-1">Rp{{ formatCurrency(item.price) }}</span></p>
                  <div class="w-px h-4 bg-gray-200"></div>
                  <p class="text-[10px] text-gray-400">HPP <span class="text-gray-600 font-semibold text-sm ml-1">Rp{{ formatCurrency(item.hpp) }}</span></p>
                  <div class="w-px h-4 bg-gray-200"></div>

const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

createApp({
  setup() {

    const isLoggedIn = ref(false);
    const userRole = ref('');

    const showExpenseModal = ref(false);

    const showVariantModal = ref(false);
    const isSavingSettings = ref(false);
    const isOnline = ref(true);

    const cart = ref([]);
    const transactions = ref([]);
    const expenses = ref([]);
    const products = ref([]);
    const searchQuery = ref('');
    const activeCategory = ref('Semua');
    const categories = ref(['Semua', 'Makanan', 'Minuman', 'Cemilan', 'Paket', 'Lainnya']);
    const reportFilter = ref({ mode: 'today', start: '', end: '' });
    const dateFilter = ref({ mode: 'single', start: '', end: '' });

    const customer = ref({ name: '', phone: '' });
    const diskon = ref(0);
    const metodeBayar = ref('Cash');
    const catatanOrder = ref('');

    const selectedProductForVariant = ref(null);
    const selectedVariants = ref([]);

    const storeProfile = ref({ name: 'Cemilan Cepuluh', phone: '', logo: '' });
    const formSettings = ref({ namawarung: 'Cemilan Cepuluh', nowawarung: '', alamat: '', waHeader: 'Halo! Berikut detail pesanan Anda:', waFooter: 'Terima kasih sudah jajan!', pin: '1234', pinKasir: '0000', logo: '' });
    const activePin = ref('1234');
    const activePinKasir = ref('0000');
    
    const formProduct = ref({ id: null, name: '', category: 'Makanan', price: 0, hpp: 0, stock: 100, icon: '📦', status: 'aktif', variants: '' });
    const formExpense = ref({ id: null, kategori: 'Bahan Baku', items: [{ keterangan: '', nominal: null }] });

    const liveClock = ref('');
    const currentDateTime = ref('');
    const tabs = ['dashboard', 'kasir', 'produk', 'laporan', 'pengaturan'];

    const IDLE_TIMEOUT_MS = 15 * 60 * 1000; 
    let idleTimer;

    const resetIdleTimer = () => {
      clearTimeout(idleTimer);
      if (isLoggedIn.value) {
        idleTimer = setTimeout(() => {
          isLoggedIn.value = false; pin.value = ''; currentTab.value = 'dashboard'; userRole.value = ''; loginError.value = "Sesi Anda terkunci otomatis demi keamanan.";

    const toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2200, timerProgressBar: true });

    const confirmAction = async (title, text) => {
      const r = await Swal.fire({ title, text, icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya', cancelButtonText: 'Batal' });
      return r.isConfirmed;
    };

    const generateId = (prefix) => prefix + '-' + Date.now() + '-' + Math.random().toString(36).substring(2, 7).toUpperCase();

    const updateClock = () => { 
      const now = new Date();
      liveClock.value = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); 
      currentDateTime.value = now.toLocaleString('id-ID', { dateStyle: 'full', timeStyle: 'short' }); 
    };

    const formatCurrency = (val) => new Intl.NumberFormat('id-ID').format(Number(val || 0));
    const formatDateTime = (val) => { if (!val) return '-'; return new Date(val).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' }); };
    const getTabIcon = (tab) => { const map = { dashboard: 'ph-house', kasir: 'ph-calculator', produk: 'ph-package', laporan: 'ph-chart-pie-slice', pengaturan: 'ph-gear' }; return map[tab] || 'ph-circle'; };
    
    // SMART SEARCH & FILTER
    const changeTab = (tab) => { currentTab.value = tab; searchQuery.value = ''; activeCategory.value = 'Semua'; };

    const isAdmin = computed(() => userRole.value === 'admin');

    const parseItems = (items) => {
      if (Array.isArray(items)) return items;
      try { return typeof items === 'string' ? JSON.parse(items || '[]') : []; } catch(e) { return []; }
    };

    // =========================================================
    // LISTENER FIREBASE REALTIME
    // =========================================================
    const loadData = () => {
      if (!db) { systemError.value = "Firebase Error: Gagal menghubungkan ke server."; isLoadingSystem.value = false; return; }
      isLoadingSystem.value = true; systemError.value = '';
      
      db.ref('.info/connected').on('value', (snap) => { isOnline.value = snap.val() === true; });
      db.ref('warungkas').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        products.value = data.products ? Object.values(data.products) : [];
        transactions.value = data.transactions ? Object.values(data.transactions).map(t => ({...t, items: parseItems(t.items)})) : [];
        expenses.value = data.expenses ? Object.values(data.expenses) : [];
        
        if (data.settings) {
          formSettings.value = { ...formSettings.value, ...data.settings };
          storeProfile.value.name = data.settings.namawarung || 'Cemilan Cepuluh';
          storeProfile.value.phone = data.settings.nowawarung || '';
          storeProfile.value.logo = data.settings.logo || '';
          activePin.value = String(data.settings.pin || '1234');
          activePinKasir.value = String(data.settings.pinKasir || '0000');
        }
        isLoadingSystem.value = false;
      }, (error) => { systemError.value = "Gagal terhubung ke Database: " + error.message; isLoadingSystem.value = false; });
    };

    const retryLoad = () => loadData();
    const appendPin = (n) => {
      if (pin.value.length >= 4) return; pin.value += String(n); loginError.value = '';
      if (pin.value.length === 4) {
        setTimeout(() => {
          if (pin.value === String(activePin.value)) { isLoggedIn.value = true; userRole.value = 'admin'; resetIdleTimer(); notify('success', 'Login Admin'); } 
          else if (pin.value === String(activePinKasir.value)) { isLoggedIn.value = true; userRole.value = 'kasir'; resetIdleTimer(); notify('success', 'Login Kasir'); }
          else { loginError.value = 'PIN Salah!'; pin.value = ''; }
        }, 150);
      }
    };
    const removePin = () => { pin.value = pin.value.slice(0, -1); }; const clearPin = () => { pin.value = ''; };
    const logout = async () => { const ok = await confirmAction('Kunci Layar?', 'Anda akan kembali ke layar login.'); if (!ok) return; isLoggedIn.value = false; userRole.value = ''; pin.value = ''; currentTab.value = 'dashboard'; clearTimeout(idleTimer); };

    const availableCategories = computed(() => { const base = ['Makanan', 'Minuman', 'Cemilan', 'Paket', 'Lainnya']; const fromProducts = products.value.map(p => p.category).filter(Boolean); return [...new Set([...base, ...fromProducts])]; });
    
    // SMART SEARCH: trim() dan toLowerCase() agar pencarian kuat terhadap spasi tidak sengaja
    const filteredProducts = computed(() => { return products.value.filter(p => { const catOk = activeCategory.value === 'Semua' || p.category === activeCategory.value; const searchOk = p.name.toLowerCase().includes(searchQuery.value.trim().toLowerCase()); const statusOk = p.status !== 'nonaktif'; return catOk && searchOk && statusOk; }); });
    const filteredCatalog = computed(() => { return products.value.filter(p => p.name.toLowerCase().includes(searchQuery.value.trim().toLowerCase())); });

    const parsedVariantsList = computed(() => {
      if (!selectedProductForVariant.value || !selectedProductForVariant.value.variants) return [];
      return selectedProductForVariant.value.variants.split(',').map(v => {
        const [name, price] = v.split(':'); return { name: name ? name.trim() : '', price: Number(price) || 0 };
      }).filter(v => v.name);
    });

    const variantTotalPrice = computed(() => {
      if (!selectedProductForVariant.value) return 0;
      let total = Number(selectedProductForVariant.value.price);
      selectedVariants.value.forEach(v => { total += v.price; });
      return total;
    });

    const handleProductClick = (item) => {
      if (item.stock <= 0) { notify('error', 'Stok Habis'); return; }
      if (item.variants && item.variants.trim() !== '') {
        selectedProductForVariant.value = item; selectedVariants.value = []; showVariantModal.value = true;
      } else { addToCart(item); }
    };

    const addVariantToCart = () => {
      let finalPrice = Number(selectedProductForVariant.value.price);
      let extraNames = [];
      selectedVariants.value.forEach(v => { finalPrice += v.price; extraNames.push(v.name); });
      let finalName = selectedProductForVariant.value.name;
      if (extraNames.length > 0) { finalName += ` (+ ${extraNames.join(', ')})`; }
      
      const cartItemKey = selectedProductForVariant.value.id + extraNames.join('');
      const existingItem = cart.value.find(i => i.cartKey === cartItemKey);
      
      if (existingItem) {
        if (getCartQtyByBaseId(selectedProductForVariant.value.id) >= (selectedProductForVariant.value.stock || 0)) { notify('error', 'Stok tidak mencukupi'); return; }
        existingItem.qty += 1;
      } else {
        if (getCartQtyByBaseId(selectedProductForVariant.value.id) >= (selectedProductForVariant.value.stock || 0)) { notify('error', 'Stok tidak mencukupi'); return; }
        cart.value.push({ ...selectedProductForVariant.value, cartKey: cartItemKey, name: finalName, price: finalPrice, qty: 1, baseId: selectedProductForVariant.value.id });
      }
      showVariantModal.value = false; notify('success', `${finalName} ditambahkan`);
    };

    const addToCart = (product) => { 
      const cartItemKey = product.id; const itemInCart = cart.value.find(i => i.cartKey === cartItemKey); 
      if (getCartQtyByBaseId(product.id) >= (product.stock || 0)) { notify('error', 'Stok tidak mencukupi'); return; }
      if (itemInCart) itemInCart.qty += 1; 
      else cart.value.push({ ...product, cartKey: cartItemKey, baseId: product.id, qty: 1 }); 
      notify('success', `${product.name} ditambahkan`); 
    };

    const getCartQty = (id) => { const item = cart.value.find(i => i.id === id || i.cartKey === id); return item ? item.qty : 0; };
    const getCartQtyByBaseId = (baseId) => { return cart.value.filter(i => (i.baseId || i.id) === baseId).reduce((sum, i) => sum + i.qty, 0); };
    const reduceCartByBaseId = (baseId) => {
       const itemsWithBaseId = cart.value.map((item, index) => ({item, index})).filter(x => (x.item.baseId || x.item.id) === baseId);
       if (itemsWithBaseId.length > 0) { const targetIdx = itemsWithBaseId[itemsWithBaseId.length - 1].index; updateQty(targetIdx, -1); }
    };

    const updateQtyById = (id, delta) => { const idx = cart.value.findIndex(i => (i.cartKey || i.id) === id); if(idx !== -1) updateQty(idx, delta); };
    const updateQty = (idx, delta) => { 
      const item = cart.value[idx]; if (!item) return; 
      const productInDB = products.value.find(p => p.id === (item.baseId || item.id));
      if (delta > 0 && getCartQtyByBaseId(item.baseId || item.id) >= (productInDB.stock || 0)) { notify('error', 'Stok tidak mencukupi'); return; }
      item.qty += delta; 
      if (item.qty <= 0) cart.value.splice(idx, 1); 
      if (!cart.value.length) showCartModal.value = false; 
    };
    const clearCart = () => { Swal.fire({ title: 'Batalkan Transaksi?', text: 'Semua pesanan di keranjang akan dihapus.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#f3f4f6', cancelButtonText: '<span style="color:black">Tidak</span>', confirmButtonText: 'Ya, Batalkan' }).then((r) => { if (r.isConfirmed) { cart.value = []; customer.value = { name: '', phone: '' }; diskon.value = 0; catatanOrder.value = ''; showCartModal.value = false; notify('info', 'Transaksi dibatalkan'); } }); };

    const cartSubtotal = computed(() => cart.value.reduce((s, i) => s + Number(i.price || 0) * Number(i.qty || 0), 0));
    const cartHppTotal = computed(() => cart.value.reduce((s, i) => s + Number(i.hpp || 0) * Number(i.qty || 0), 0));
    const cartTotal = computed(() => Math.max(0, cartSubtotal.value - Number(diskon.value || 0)));
    const cartTotalItems = computed(() => cart.value.reduce((s, i) => s + Number(i.qty || 0), 0));

    const lowStockProducts = computed(() => products.value.filter(p => p.stock <= 5 && p.status !== 'nonaktif'));

    // SMART FILTER DATE
    const isWithinFilter = (dateStr) => {
      const d = new Date(dateStr); if (reportFilter.value.mode === 'today') { return d.toDateString() === new Date().toDateString(); }
      if (reportFilter.value.mode === 'range' && reportFilter.value.start) { const start = new Date(reportFilter.value.start); const end = new Date(reportFilter.value.end || reportFilter.value.start); end.setHours(23, 59, 59, 999); return d >= start && d <= end; } return true;
    };

    const filteredTransactions = computed(() => [...transactions.value].filter(t => isWithinFilter(t.tanggal)).reverse());
    const filteredExpenses = computed(() => [...expenses.value].filter(e => isWithinFilter(e.tanggal)).reverse());

    const filteredReport = computed(() => {
      let omzet = 0, hpp = 0, pengeluaran = 0;
      filteredTransactions.value.forEach(t => { omzet += Number(t.total || 0); hpp += Number(t.hppTotal || 0); });
      filteredExpenses.value.forEach(e => { pengeluaran += Number(e.nominal || 0); });
      const labaBersih = omzet - hpp - pengeluaran;
      return { omzet, hpp, pengeluaran, labaBersih, isMinus: labaBersih < 0, labaKotor: omzet - hpp };
    });

    const dashboardStats = computed(() => {
      const today = new Date().toDateString(); const trxToday = transactions.value.filter(t => new Date(t.tanggal).toDateString() === today);
      return { omzet: filteredReport.value.omzet, labaKotor: filteredReport.value.labaKotor, totalPengeluaran: filteredReport.value.pengeluaran, isLabaMinus: filteredReport.value.isMinus, totalTrx: reportFilter.value.mode === 'today' ? trxToday.length : filteredTransactions.value.length };
    });

    const topSoldToday = computed(() => {
      const trxs = filteredTransactions.value; const itemMap = {};
      trxs.forEach(t => { const parsed = parseItems(t.items); parsed.forEach(i => { const cleanName = i.name.split(' (+')[0]; if (!itemMap[cleanName]) itemMap[cleanName] = { name: cleanName, qty: 0 }; itemMap[cleanName].qty += Number(i.qty || 0); }); });
      const sorted = Object.values(itemMap).sort((a, b) => b.qty - a.qty).slice(0, 5); const maxQty = sorted.length ? Math.max(...sorted.map(x => x.qty)) : 0;
      return sorted.map(x => ({ ...x, pct: maxQty > 0 ? (x.qty / maxQty) * 100 : 0 }));
    });

    const dashboardInsight = computed(() => {
      if (reportFilter.value.mode !== 'today') { return `Menampilkan data periode terpilih. Total ${dashboardStats.value.totalTrx} transaksi.`; }
      const omzet = dashboardStats.value.omzet; const trx = dashboardStats.value.totalTrx;
      if (trx === 0) return "Belum ada transaksi hari ini, ayo semangat jualan! 💪";
      if (dashboardStats.value.isLabaMinus) return `Omzet Rp ${formatCurrency(omzet)}, tapi laba bersih minus. Cek kembali pengeluaran Anda. 📉`;
      if (trx > 10) return `Luar biasa! Tembus ${trx} transaksi dengan omzet Rp ${formatCurrency(omzet)}. Pertahankan! 🚀`;
      return `Hari ini sudah ada ${trx} transaksi masuk (Rp ${formatCurrency(omzet)}). Yuk gas lagi biar makin cuan! 🔥`;
    });

    const setReportFilter = (mode) => { reportFilter.value.mode = mode; if (mode !== 'range') { reportFilter.value.start = ''; reportFilter.value.end = ''; } };
    const openDateFilter = () => { showDateFilterModal.value = true; dateFilter.value.mode = 'single'; dateFilter.value.start = ''; dateFilter.value.end = ''; };

    const resetDateFilter = () => { reportFilter.value = { mode: 'all', start: '', end: '' }; showDateFilterModal.value = false; notify('success', 'Filter direset'); };

    // =========================================================
    // SMART WA TEMPLATE BUG FIX (NO NUMBER & TEXT FORMAT)
    // =========================================================
    const generateWAURL = () => { 
      let text = `*${formSettings.value.waHeader || 'Halo! Berikut detail pesanan Anda:'}*\n`; 
      text += new Date().toLocaleString('id-ID') + '\n'; 
      text += '---------------------------------------------\n'; 
      cart.value.forEach(item => { 
        text += `*${item.name} (${item.qty}x)*\nRp ${formatCurrency(item.price * item.qty)}\n`; 
      }); 
      text += '---------------------------------------------\n'; 
      if (diskon.value > 0) text += `Diskon: -Rp ${formatCurrency(diskon.value)}\n`; 
      text += `*TOTAL: Rp ${formatCurrency(cartTotal.value)}*\n`; 
      text += '---------------------------------------------\n'; 
      text += `_${formSettings.value.pesanfooter || 'Terima kasih sudah jajan!'}_`; 

      const encodedText = encodeURIComponent(text);
      let targetNum = customer.value.phone || ''; 

      if (targetNum && targetNum.trim() !== '') {
        if (targetNum.startsWith('0')) targetNum = '62' + targetNum.substring(1);
        else if (!targetNum.startsWith('62') && !targetNum.startsWith('+62')) targetNum = '62' + targetNum;
        targetNum = targetNum.replace('+', '');
        return `https://api.whatsapp.com/send?phone=${targetNum}&text=${encodedText}`;
      } else {
        // Mode Forward: Akan membuka kontak list di WA HP untuk diteruskan
        return `https://api.whatsapp.com/send?text=${encodedText}`;
      }
    };
    
    // =========================================================
    // CRUD FIREBASE 
    // =========================================================
    const processPayment = async (type) => {
      if (!cart.value.length) { notify('error', 'Keranjang masih kosong'); return; }
      const tempId = generateId('TRX'); 
      const payload = { 
        id: tempId,
        tanggal: new Date().toISOString(), customerName: customer.value.name, customerPhone: customer.value.phone, 
        subtotal: cartSubtotal.value, diskon: Number(diskon.value || 0), total: cartTotal.value, hppTotal: cartHppTotal.value, 
        metodeBayar: metodeBayar.value, bayar: cartTotal.value, kembalian: 0, catatan: catatanOrder.value, 
        kasir: userRole.value, 
        items: cart.value.map(i => ({ id: i.id, baseId: i.baseId || i.id, name: i.name, qty: Number(i.qty), price: Number(i.price), hpp: Number(i.hpp || 0) })) 
      };
      
      let updates = {};
      updates['warungkas/transactions/' + tempId] = payload;
      cart.value.forEach(item => {
        const productInDB = products.value.find(p => p.id === (item.baseId || item.id));
        if (productInDB) {
          const newStock = Math.max(0, (productInDB.stock || 0) - item.qty);
          updates[`warungkas/products/${productInDB.id}/stock`] = newStock;
        }
      });
      db.ref().update(updates);
      
      if (type === 'wa') window.open(generateWAURL(), '_blank');
      cart.value = []; customer.value = { name: '', phone: '' }; diskon.value = 0; metodeBayar.value = 'Cash'; catatanOrder.value = ''; showCartModal.value = false; changeTab('dashboard'); notify('success', 'Transaksi berhasil dicatat');
    };

    const deleteTransaction = async (trx) => { 
      const ok = await confirmAction('Hapus transaksi?', 'Stok barang akan dikembalikan.'); 
      if (!ok) return; 
      let updates = {}; updates['warungkas/transactions/' + trx.id] = null;
      const items = parseItems(trx.items);
      items.forEach(item => { const baseId = item.baseId || item.id; const productInDB = products.value.find(p => p.id === baseId); if (productInDB) { updates[`warungkas/products/${baseId}/stock`] = (productInDB.stock || 0) + item.qty; } });
      db.ref().update(updates); notify('success', 'Transaksi dihapus & Stok dikembalikan'); 
    };

    const editTransaction = (trx) => { Swal.fire({ title: 'Edit (Retur) Struk?', text: 'Struk ini akan dibatalkan, dan barang dikembalikan ke Keranjang.', icon: 'question', showCancelButton: true, confirmButtonColor: '#3b82f6', confirmButtonText: 'Ya, Ubah Pesanan' }).then(r => { if(r.isConfirmed) { 
      let updates = {}; updates['warungkas/transactions/' + trx.id] = null;
      const items = parseItems(trx.items);
      items.forEach(item => { const baseId = item.baseId || item.id; const productInDB = products.value.find(p => p.id === baseId); if (productInDB) updates[`warungkas/products/${baseId}/stock`] = (productInDB.stock || 0) + item.qty; });
      db.ref().update(updates);
      cart.value = [...items]; customer.value = { name: trx.customerName || '', phone: trx.customerPhone || '' }; diskon.value = trx.diskon || 0; metodeBayar.value = trx.metodeBayar || 'Cash'; catatanOrder.value = trx.catatan || ''; changeTab('kasir'); notify('info', 'Silakan ubah pesanan di Keranjang'); } }); 
    };

    const openProductModal = (p = null) => { formProduct.value = p ? { ...p } : { id: null, name: '', category: 'Makanan', price: 0, hpp: 0, stock: 100, icon: '📦', status: 'aktif', variants: '' }; showProductModal.value = true; };
    const saveProduct = async () => { 
      if (!formProduct.value.name || Number(formProduct.value.price) <= 0) { notify('error', 'Nama dan harga wajib diisi'); return; } 
      const payload = { ...formProduct.value }; if (!payload.id) payload.id = generateId('PRD'); 
      db.ref('warungkas/products/' + payload.id).set(payload); 
      showProductModal.value = false; notify('success', 'Menu berhasil disimpan'); 
    };
    const deleteProduct = async (id) => { const ok = await confirmAction('Hapus produk?', 'Produk akan dihapus dari daftar.'); if (!ok) return; db.ref('warungkas/products/' + id).remove(); showProductModal.value = false; notify('success', 'Produk dihapus'); };

    // SMART CRUD PENGELUARAN (Bisa Mode Tambah/Edit)
    const openExpenseModal = (exp = null) => {
      if (exp) {
        formExpense.value = { id: exp.id, kategori: exp.kategori, items: [{ keterangan: exp.keterangan, nominal: exp.nominal }] };
      } else {
        formExpense.value = { id: null, kategori: 'Bahan Baku', items: [{ keterangan: '', nominal: null }] };
      }
      showExpenseModal.value = true;
    };

    const addExpenseItem = () => formExpense.value.items.push({ keterangan: '', nominal: null });
    const removeExpenseItem = (idx) => formExpense.value.items.splice(idx, 1);
    const expenseTotal = computed(() => formExpense.value.items.reduce((s, i) => s + Number(i.nominal || 0), 0));

    const saveExpense = () => {
      // Jika mode Edit (hanya 1 item)
      if (formExpense.value.id) {
        const item = formExpense.value.items[0];
        if (!item.keterangan || Number(item.nominal) <= 0) return notify('error', 'Data tidak valid');
        
        const existingExp = expenses.value.find(e => e.id === formExpense.value.id);
        const payload = { id: formExpense.value.id, tanggal: existingExp.tanggal, kategori: formExpense.value.kategori, nominal: Number(item.nominal), keterangan: item.keterangan };
        db.ref('warungkas/expenses/' + payload.id).set(payload);
        showExpenseModal.value = false;
        notify('success', 'Pengeluaran diperbarui');
      } 
      // Jika mode Tambah Baru (bisa multi-item)
      else {
        const validItems = formExpense.value.items.filter(i => i.keterangan && Number(i.nominal) > 0);
        if (validItems.length === 0) return notify('error', 'Masukkan minimal 1 pengeluaran');
        const baseTanggal = new Date();
        let updates = {};
        validItems.forEach((item, index) => { const d = new Date(baseTanggal.getTime() + index * 1000); const eid = generateId('EXP'); updates[`warungkas/expenses/${eid}`] = { id: eid, tanggal: d.toISOString(), kategori: formExpense.value.kategori, nominal: Number(item.nominal), keterangan: item.keterangan }; });
        db.ref().update(updates);
        showExpenseModal.value = false;
        notify('success', `${validItems.length} Pengeluaran dicatat`);
      }
    };

    const deleteExpense = async (id) => { const ok = await confirmAction('Hapus pengeluaran?', 'Data pengeluaran akan dihapus permanen.'); if (!ok) return; db.ref('warungkas/expenses/' + id).remove(); notify('success', 'Pengeluaran dihapus'); };

    const saveSettings = async () => { 
      if (String(formSettings.value.pin).length !== 4 || isNaN(Number(formSettings.value.pin))) { notify('error', 'PIN Admin harus 4 digit angka'); return; } 
      if (String(formSettings.value.pinKasir).length !== 4 || isNaN(Number(formSettings.value.pinKasir))) { notify('error', 'PIN Kasir harus 4 digit angka'); return; } 
      isSavingSettings.value = true; 
      const payload = { ...formSettings.value, pin: String(formSettings.value.pin), pinKasir: String(formSettings.value.pinKasir) }; 
      try { await db.ref('warungkas/settings').set(payload); notify('success', 'Pengaturan disimpan'); } finally { isSavingSettings.value = false; }
    };

    // DYNAMIC REKAP SHIFT UI
    const closeShift = () => {
      const hariIni = new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      
      const htmlContent = `
        <div class="text-left space-y-3 mt-4 text-sm bg-gray-50 p-5 rounded-2xl border border-gray-200">
          <div class="flex justify-between border-b border-gray-200 pb-3">
            <span class="text-gray-600 font-bold">Omzet Penjualan</span> 
            <span class="font-black text-secondary">Rp ${formatCurrency(dashboardStats.value.omzet)}</span>
          </div>
          <div class="flex justify-between border-b border-gray-200 pb-3">
            <span class="text-gray-600 font-bold">Pengeluaran Laci</span> 
            <span class="font-black text-red-500">- Rp ${formatCurrency(dashboardStats.value.totalPengeluaran)}</span>
          </div>
          <div class="flex justify-between border-b border-gray-200 pb-3">
            <span class="text-gray-600 font-bold">Total Struk</span> 
            <span class="font-black text-secondary">${dashboardStats.value.totalTrx} Transaksi</span>
          </div>
          <div class="flex justify-between items-center bg-blue-100 p-4 rounded-xl mt-4 border border-blue-200">
            <span class="text-blue-800 font-black uppercase tracking-wider text-xs">Sisa Uang Di Laci</span> 
            <span class="font-black text-blue-700 text-xl">Rp ${formatCurrency(dashboardStats.value.omzet - dashboardStats.value.totalPengeluaran)}</span>
          </div>
        </div>
        <p class="text-xs text-gray-500 mt-4 text-center">Pastikan uang fisik sesuai dengan perhitungan sistem sebelum menutup shift.</p>
      `;
      
      Swal.fire({
        title: `Rekap Kasir<br><span class="text-sm font-medium text-gray-400">${hariIni}</span>`,
        html: htmlContent,
        showCancelButton: true,
        confirmButtonText: '<i class="ph-bold ph-lock-key"></i> Tutup & Lock Layar',
        cancelButtonText: 'Kembali',
        confirmButtonColor: '#1E293B',
        cancelButtonColor: '#f3f4f6',
        customClass: { cancelButton: 'text-gray-800 font-bold' }
      }).then((result) => {
        if (result.isConfirmed) { logout(); }
      });
    };
    
    const exportDataExcel = () => { const wb = XLSX.utils.book_new(); const wsProducts = XLSX.utils.json_to_sheet(products.value); const wsTransactions = XLSX.utils.json_to_sheet(transactions.value.map(t => ({ ...t, items: JSON.stringify(t.items || []) }))); const wsExpenses = XLSX.utils.json_to_sheet(expenses.value); XLSX.utils.book_append_sheet(wb, wsProducts, 'Products'); XLSX.utils.book_append_sheet(wb, wsTransactions, 'Transactions'); XLSX.utils.book_append_sheet(wb, wsExpenses, 'Expenses'); const fileName = 'WarungKas_Backup_' + Date.now() + '.xlsx'; XLSX.writeFile(wb, fileName); notify('success', 'Export Excel berhasil'); };
    const importDataExcel = async (e) => { const file = e.target.files[0]; if (!file) return; try { const data = await file.arrayBuffer(); const wb = XLSX.read(data, { type: 'array' }); let updates = {}; if (wb.SheetNames.includes('Products')) { const prods = XLSX.utils.sheet_to_json(wb.Sheets['Products']); updates['warungkas/products'] = prods.reduce((acc, p) => ({ ...acc, [p.id]: p }), {}); } if (wb.SheetNames.includes('Transactions')) { const trxs = XLSX.utils.sheet_to_json(wb.Sheets['Transactions']).map(t => ({ ...t, items: parseItems(t.items) })); updates['warungkas/transactions'] = trxs.reduce((acc, t) => ({ ...acc, [t.id]: t }), {}); } if (wb.SheetNames.includes('Expenses')) { const exps = XLSX.utils.sheet_to_json(wb.Sheets['Expenses']); updates['warungkas/expenses'] = exps.reduce((acc, e) => ({ ...acc, [e.id]: e }), {}); } await db.ref().update(updates); notify('success', 'Data Cloud berhasil di-overwrite dari Excel'); } catch (err) { notify('error', 'File Excel tidak valid'); } finally { e.target.value = ''; } };
    const handleLogoUpload = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (event) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); const MAX_WIDTH = 250; const scaleSize = MAX_WIDTH / img.width; canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); formSettings.value.logo = canvas.toDataURL('image/jpeg', 0.8); notify('success', 'Foto berhasil dipilih'); }; img.src = event.target.result; }; reader.readAsDataURL(file); };

    onMounted(() => { 
      updateClock(); setInterval(updateClock, 1000); 
      loadData(); 
      window.addEventListener('mousemove', resetIdleTimer); window.addEventListener('keydown', resetIdleTimer); window.addEventListener('touchstart', resetIdleTimer);
    });

    onUnmounted(() => {
      window.removeEventListener('mousemove', resetIdleTimer); window.removeEventListener('keydown', resetIdleTimer); window.removeEventListener('touchstart', resetIdleTimer); clearTimeout(idleTimer);
    });

    return {
      isLoadingSystem, systemError, retryLoad, isLoggedIn, pin, loginError, appendPin, removePin, clearPin, logout,
      currentTab, historyTab, changeTab, getTabIcon, currentDateTime, liveClock, formatCurrency, formatDateTime, cart, addToCart, getCartQty, updateQty, updateQtyById, clearCart, getCartQtyByBaseId, reduceCartByBaseId, handleProductClick,
      cartTotalItems, cartSubtotal, cartTotal, diskon, metodeBayar, catatanOrder, processPayment, customer, parseItems,
      showCartModal, products, filteredProducts, filteredCatalog, searchQuery, activeCategory, categories, availableCategories, showProductModal, openProductModal, saveProduct, deleteProduct, formProduct,
      showVariantModal, selectedProductForVariant, selectedVariants, parsedVariantsList, variantTotalPrice, addVariantToCart,
      showExpenseModal, formExpense, saveExpense, deleteExpense, openExpenseModal, addExpenseItem, removeExpenseItem, expenseTotal, dashboardInsight, lowStockProducts, closeShift,
      reportFilter, filteredReport, filteredTransactions, filteredExpenses, dashboardStats, topSoldToday,
      storeProfile, formSettings, saveSettings, isSavingSettings, exportDataExcel, importDataExcel, handleLogoUpload,
      setReportFilter, openDateFilter, showDateFilterModal, dateFilter, applyDateFilter, resetDateFilter, tabs, deleteTransaction, editTransaction,
      isOnline, userRole, isAdmin
    };
  }
}).mount('#app');
</script>
</body>
