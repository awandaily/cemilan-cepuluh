<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WarungKas POS Enterprise</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { primary: '#FF6B35', 'primary-dark': '#E85A28', secondary: '#1E293B', success: '#10B981', background: '#F8FAFC', surface: '#FFFFFF' },
          boxShadow: { soft: '0 4px 20px -2px rgba(0, 0, 0, 0.05)', glass: '0 8px 32px 0 rgba(31, 38, 135, 0.07)' }
        }
      }
    };
  </script>

  <style>
    html, body { margin: 0; background: #E2E8F0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    #app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    [v-cloak] { display: none; }
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { scrollbar-width: none; }
    .animate-fade-in { animation: fadeIn .25s ease-out forwards; }
    .animate-slide-up { animation: slideUp .25s cubic-bezier(.16,1,.3,1) forwards; }
    .animate-pop { animation: pop .18s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes pop { from { transform: scale(.90); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes growBar { from { width: 0%; } }
    .animate-bar { animation: growBar 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .glass-nav { background: rgba(255,255,255,.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,.35); }
    .loader { border: 4px solid #f3f3f3; border-top: 4px solid #FF6B35; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg);} 100% { transform: rotate(360deg);} }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  </style>
</head>

<body class="text-secondary antialiased">
<div id="app" v-cloak class="w-full max-w-md mx-auto bg-background h-screen relative shadow-2xl overflow-hidden flex flex-col">

  <div v-if="isLoadingSystem" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center animate-fade-in">
    <div class="loader mb-4"></div>
    <p class="text-sm font-semibold text-gray-500 animate-pulse">Menghubungkan ke API Cloud...</p>
    <span class="mt-8 text-[10px] text-gray-400">WarungKas Vercel Edition</span>
  </div>

  <div v-else-if="systemError" class="absolute inset-0 bg-white z-50 flex flex-col items-center justify-center p-6 text-center animate-fade-in">
    <i class="ph-fill ph-warning-circle text-red-500 text-7xl mb-4"></i>
    <h2 class="text-xl font-bold text-secondary mb-2">Koneksi API Gagal</h2>
    <p class="text-xs text-gray-500 mb-4 bg-red-50 p-4 rounded-xl border border-red-100 text-left font-mono break-words w-full">{{ systemError }}</p>
    <button @click="retryLoad" class="bg-primary text-white font-bold px-8 py-3 rounded-2xl shadow-md active:scale-95 transition-transform flex items-center gap-2 mb-4">
      <i class="ph-bold ph-arrows-clockwise"></i> Coba Lagi
    </button>
  </div>

  <div v-else-if="!isLoggedIn" class="absolute inset-0 bg-primary z-40 flex flex-col items-center justify-center px-6 animate-fade-in text-white">
    <img v-if="storeProfile.logo" :src="storeProfile.logo" class="w-24 h-24 rounded-3xl mb-4 shadow-glass object-cover border-4 border-white/20 animate-pop" />
    <div v-else class="w-20 h-20 bg-white text-primary rounded-3xl flex items-center justify-center text-4xl mb-6 shadow-glass animate-pop"><i class="ph-fill ph-storefront"></i></div>
    
    <h1 class="text-3xl font-extrabold tracking-tight mb-2">{{ storeProfile.name || 'WarungKas' }}</h1>
    <p class="text-white/80 mb-8 text-center text-sm">Masukan PIN untuk mengakses sistem.</p>

    <div class="flex gap-4 mb-8"><div v-for="i in 4" :key="i" class="w-4 h-4 rounded-full transition-all duration-300" :class="pin.length >= i ? 'bg-white scale-110 shadow-lg' : 'bg-white/30'"></div></div>

    <div class="grid grid-cols-3 gap-4 w-full max-w-[280px]">
      <button v-for="n in 9" :key="n" @click="appendPin(n)" class="h-16 rounded-full text-2xl font-semibold hover:bg-white/10 active:bg-white/20 transition-colors bg-white/5">{{ n }}</button>
      <button @click="clearPin" class="h-16 rounded-full text-2xl font-semibold hover:bg-white/10 active:bg-white/20 transition-colors flex items-center justify-center text-white/70 bg-white/5"><i class="ph-bold ph-x"></i></button>
      <button @click="appendPin(0)" class="h-16 rounded-full text-2xl font-semibold hover:bg-white/10 active:bg-white/20 transition-colors bg-white/5">0</button>
      <button @click="removePin" class="h-16 rounded-full text-2xl font-semibold hover:bg-white/10 active:bg-white/20 transition-colors flex items-center justify-center text-white/70 bg-white/5"><i class="ph-bold ph-backspace"></i></button>
    </div>

    <p v-if="loginError" class="mt-6 text-red-200 bg-red-900/30 px-4 py-2 rounded-xl text-sm animate-fade-in">{{ loginError }}</p>
    <p v-else class="mt-6 text-white/50 text-xs">PIN diatur di Pengaturan</p>
  </div>

  <template v-else>
    <header class="bg-surface px-5 py-4 flex justify-between items-center sticky top-0 z-30 border-b border-gray-100 shadow-sm">
      <div>
        <h1 class="text-xl font-bold flex items-center gap-2 text-secondary tracking-tight">
          <img v-if="storeProfile.logo" :src="storeProfile.logo" class="w-7 h-7 rounded-lg object-cover" />
          <span v-else class="bg-primary text-white p-1.5 rounded-lg"><i class="ph-fill ph-storefront text-sm"></i></span>
          {{ storeProfile.name }}
        </h1>
        <div class="mt-1.5 flex items-center gap-2">
          <button @click="forceSync" :disabled="isSyncing" class="inline-flex items-center gap-1 bg-blue-100 text-blue-700 border border-blue-200 text-[9px] px-2 py-0.5 rounded-full font-bold active:scale-95 transition-transform disabled:opacity-70">
            <i class="ph-bold ph-arrows-clockwise" :class="{'animate-spin': isSyncing}"></i>
            {{ isSyncing ? 'Sinkronisasi...' : 'Sync Data' }}
          </button>
          <span class="text-[10px] font-medium text-gray-500">{{ currentDateTime }}</span>
        </div>
      </div>
      <div class="text-right">
        <p class="text-[10px] text-gray-400 font-medium uppercase tracking-wider">Jam Realtime</p>
        <p class="text-sm font-bold text-primary">{{ liveClock }}</p>
      </div>
    </header>

    <main class="flex-1 min-h-0 scroll-area pb-[92px]">
      <div class="p-5">

        <div v-if="currentTab === 'dashboard'" class="space-y-5 animate-fade-in">
          
          <div class="bg-blue-50 border border-blue-100 p-3.5 rounded-2xl flex items-start gap-3 shadow-sm">
            <div class="bg-blue-100 text-blue-600 p-2 rounded-xl shrink-0"><i class="ph-fill ph-lightbulb text-xl"></i></div>
            <div>
              <p class="text-xs font-extrabold text-blue-800 mb-0.5">Insight Hari Ini</p>
              <p class="text-[11px] text-blue-600 font-medium leading-relaxed">{{ dashboardInsight }}</p>
            </div>
          </div>

          <div class="bg-gradient-to-br from-primary to-primary-dark p-6 rounded-3xl shadow-lg text-white relative overflow-hidden">
            <div class="absolute top-0 right-0 -mr-8 -mt-8 w-32 h-32 rounded-full bg-white opacity-10"></div>
            <div class="relative z-10">
              <p class="text-sm font-medium text-white/80 mb-1">Omzet Penjualan</p>
              <h2 class="text-3xl font-extrabold tracking-tight mb-4">Rp {{ formatCurrency(dashboardStats.omzet) }}</h2>
              <div class="flex gap-2 flex-wrap">
                <button @click="setReportFilter('all')" :class="reportFilter.mode==='all' ? 'bg-white text-primary' : 'bg-white/20 text-white'" class="text-xs font-bold px-3 py-1 rounded-full transition-colors">Semua</button>
                <button @click="setReportFilter('today')" :class="reportFilter.mode==='today' ? 'bg-white text-primary' : 'bg-white/20 text-white'" class="text-xs font-bold px-3 py-1 rounded-full transition-colors">Hari Ini</button>
                <button @click="openDateFilter()" class="text-xs font-bold px-3 py-1 rounded-full transition-colors bg-white/20 text-white"><i class="ph-bold ph-calendar"></i> Tanggal</button>
              </div>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div @click="changeTab('laporan')" class="bg-surface p-4 rounded-2xl shadow-soft border border-gray-50 flex flex-col gap-2 animate-slide-up cursor-pointer hover:bg-gray-50">
              <div class="h-8 w-8 rounded-full bg-green-50 text-green-600 flex items-center justify-center"><i class="ph-bold ph-target"></i></div>
              <p class="text-xs text-gray-400 font-medium">Laba Kotor</p><p class="font-bold text-secondary">Rp {{ formatCurrency(dashboardStats.labaKotor) }}</p>
            </div>
            <div @click="changeTab('laporan')" class="bg-surface p-4 rounded-2xl shadow-soft border border-gray-50 flex flex-col gap-2 animate-slide-up cursor-pointer hover:bg-gray-50" style="animation-delay: 0.1s;">
              <div class="h-8 w-8 rounded-full bg-orange-50 text-orange-500 flex items-center justify-center"><i class="ph-bold ph-chart-line-down"></i></div>
              <p class="text-xs text-gray-400 font-medium">Pengeluaran</p><p class="font-bold text-secondary">Rp {{ formatCurrency(dashboardStats.totalPengeluaran) }}</p>
            </div>
            <div @click="changeTab('laporan')" class="bg-surface p-4 rounded-2xl shadow-soft border border-gray-50 flex flex-col gap-2 animate-slide-up cursor-pointer hover:bg-gray-50" style="animation-delay: 0.2s;">
              <div class="h-8 w-8 rounded-full bg-purple-50 text-purple-500 flex items-center justify-center"><i class="ph-bold ph-receipt"></i></div>
              <p class="text-xs text-gray-400 font-medium">Total Transaksi</p><p class="font-bold text-primary">{{ dashboardStats.totalTrx }} Struk &rarr;</p>
            </div>
            <div @click="changeTab('laporan')" class="bg-surface p-4 rounded-2xl shadow-soft border border-gray-50 flex flex-col gap-2 animate-slide-up cursor-pointer hover:bg-gray-50" style="animation-delay: 0.3s;">
              <div class="h-8 w-8 rounded-full bg-blue-50 text-blue-500 flex items-center justify-center"><i class="ph-bold ph-money"></i></div>
              <p class="text-xs text-gray-400 font-medium">Laba Bersih</p><p class="font-bold" :class="dashboardStats.isLabaMinus ? 'text-red-500' : 'text-success'">Rp {{ formatCurrency(filteredReport.labaBersih) }}</p>
            </div>
          </div>

          <div class="grid grid-cols-2 gap-3 mt-4 animate-slide-up" style="animation-delay: 0.4s;">
            <button @click="changeTab('kasir')" class="w-full bg-secondary text-white py-4 rounded-2xl font-semibold shadow-glass flex flex-col items-center justify-center gap-1 active:scale-95 transition-all">
              <i class="ph-bold ph-calculator text-2xl"></i> <span class="text-sm">Buka Kasir</span>
            </button>
            <button @click="showExpenseModal = true" class="w-full bg-red-50 text-red-600 border border-red-100 py-4 rounded-2xl font-semibold shadow-sm flex flex-col items-center justify-center gap-1 active:scale-95 transition-all">
              <i class="ph-bold ph-hand-coins text-2xl"></i> <span class="text-sm">Pengeluaran</span>
            </button>
          </div>

          <div class="bg-white p-5 rounded-3xl shadow-soft border border-gray-100 animate-slide-up" style="animation-delay: 0.5s;">
            <h3 class="text-sm font-bold text-gray-600 mb-4 flex items-center gap-2"><i class="ph-bold ph-chart-bar text-primary text-lg"></i> Top Produk Terjual (Periode Ini)</h3>
            <div v-if="topSoldToday.length" class="space-y-4">
              <div v-for="(item, idx) in topSoldToday" :key="idx" class="relative">
                <div class="flex justify-between text-xs font-semibold mb-1 text-secondary"><span>{{ item.name }}</span><span class="text-primary">{{ item.qty }} Pcs</span></div>
                <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden"><div class="bg-primary h-2.5 rounded-full animate-bar" :style="{ width: item.pct + '%' }"></div></div>
              </div>
            </div>
            <div v-else class="text-center text-xs text-gray-400 py-6 border border-dashed border-gray-200 rounded-xl">Belum ada penjualan.</div>
          </div>
        </div>

        <div v-else-if="currentTab === 'kasir'" class="space-y-5 animate-fade-in relative min-h-full">
          <div class="relative">
            <i class="ph-bold ph-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            <input v-model="searchQuery" type="text" placeholder="Cari menu..." class="w-full pl-11 pr-12 py-3 rounded-2xl border border-gray-100 shadow-soft focus:ring-2 focus:ring-primary outline-none text-sm font-medium bg-white transition-all">
            <button v-if="searchQuery" @click="searchQuery = ''" class="absolute right-3 top-2 bg-red-50 text-red-500 p-1.5 rounded-xl active:scale-90 transition-all animate-pop"><i class="ph-bold ph-x text-sm"></i></button>
          </div>

          <div class="flex gap-2 overflow-x-auto pb-2 hide-scrollbar">
            <button v-for="cat in categories" :key="cat" @click="activeCategory = cat" class="px-4 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap shadow-sm transition-colors" :class="activeCategory===cat ? 'bg-primary text-white' : 'bg-white text-gray-500 border border-gray-100'">{{ cat }}</button>
          </div>

          <div class="grid grid-cols-2 gap-4 pb-32">
            <div v-for="item in filteredProducts" :key="item.id" @click="addToCart(item)" class="bg-white p-4 rounded-3xl shadow-soft border border-gray-50 active:bg-gray-50 cursor-pointer flex flex-col items-center text-center relative animate-pop">
              <div v-if="getCartQty(item.id)" class="absolute -top-2 -right-2 bg-primary text-white w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold shadow-sm">{{ getCartQty(item.id) }}</div>
              <div class="text-5xl mb-3 mt-2">{{ item.icon }}</div>
              <h3 class="text-sm font-bold text-secondary leading-tight">{{ item.name }}</h3>
              <p class="text-primary font-extrabold text-sm mt-1">Rp {{ formatCurrency(item.price) }}</p>
            </div>
            <div v-if="!filteredProducts.length" class="col-span-2 text-center py-10 text-gray-400 text-sm">Produk belum tersedia.</div>
          </div>

          <div v-if="cart.length" class="fixed bottom-[88px] left-0 right-0 max-w-md mx-auto px-5 z-20 animate-slide-up">
            <div class="bg-secondary text-white rounded-3xl p-3 shadow-glass flex items-center">
              <button @click.stop="clearCart" class="bg-white/10 hover:bg-red-500/20 text-white hover:text-red-400 p-3 rounded-2xl active:scale-90 transition-all mr-3 flex-shrink-0" title="Batal Transaksi"><i class="ph-bold ph-trash text-xl"></i></button>
              <div class="flex-1 flex justify-between items-center cursor-pointer active:scale-95 transition-transform" @click="showCartModal = true">
                <div class="flex items-center gap-3">
                  <div class="relative"><i class="ph-duotone ph-shopping-cart text-3xl text-primary"></i><span class="absolute -top-1 -right-2 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-secondary">{{ cartTotalItems }}</span></div>
                  <div><p class="text-xs text-gray-400 font-medium">{{ cartTotalItems }} item</p><p class="font-bold text-lg leading-none">Rp {{ formatCurrency(cartTotal) }}</p></div>
                </div>
                <div class="bg-primary text-white p-2 rounded-xl mr-1"><i class="ph-bold ph-arrow-right text-xl"></i></div>
              </div>
            </div>
          </div>
        </div>

        <div v-else-if="currentTab === 'produk'" class="space-y-4 animate-fade-in">
          <div class="flex justify-between items-center mb-1">
            <h2 class="font-bold text-xl text-secondary">Katalog Menu</h2>
            <button @click="openProductModal()" class="bg-primary text-white px-3 py-2 rounded-xl shadow-md flex items-center gap-2 text-sm font-bold active:scale-95">
              <i class="ph-bold ph-plus"></i> Menu Baru
            </button>
          </div>

          <div class="relative">
            <i class="ph-bold ph-magnifying-glass absolute left-4 top-3.5 text-gray-400"></i>
            <input v-model="searchQuery" type="text" placeholder="Cari nama menu..." class="w-full pl-11 pr-12 py-3 rounded-2xl border border-gray-200 shadow-sm focus:ring-2 focus:ring-primary outline-none text-sm bg-white transition-all">
            <button v-if="searchQuery" @click="searchQuery = ''" class="absolute right-3 top-2 bg-red-50 text-red-500 p-1.5 rounded-xl active:scale-90 transition-all animate-pop"><i class="ph-bold ph-x text-sm"></i></button>
          </div>

          <div class="space-y-3">
            <div v-for="item in filteredCatalog" :key="item.id" class="bg-white p-4 rounded-2xl shadow-soft border border-gray-50 flex items-center gap-4 animate-slide-up">
              <div class="text-3xl bg-gray-50 h-14 w-14 rounded-2xl flex items-center justify-center">{{ item.icon }}</div>
              <div class="flex-1">
                <div class="flex justify-between gap-2">
                  <h3 class="font-bold text-sm text-secondary">{{ item.name }}</h3>
                  <button @click="openProductModal(item)" class="text-gray-400 hover:text-primary"><i class="ph-fill ph-pencil-simple text-lg"></i></button>
                </div>
                <div class="flex items-center gap-4 mt-1">
                  <p class="text-[10px] text-gray-400">Jual</p><p class="text-primary font-bold text-sm">Rp {{ formatCurrency(item.price) }}</p>
                  <div class="w-px h-4 bg-gray-200"></div>
                  <p class="text-[10px] text-gray-400">HPP</p><p class="text-gray-600 font-semibold text-sm">Rp {{ formatCurrency(item.hpp) }}</p>
                </div>
              </div>
            </div>
            <div v-if="!filteredCatalog.length" class="text-center text-xs text-gray-400 py-10">Pencarian tidak ditemukan.</div>
          </div>
        </div>

        <div v-else-if="currentTab === 'laporan'" class="space-y-5 animate-fade-in">
          <div class="flex justify-between items-center">
            <h2 class="font-bold text-xl text-secondary">Laporan Keuangan</h2>
            <button @click="openDateFilter()" class="text-xs font-semibold bg-gray-100 px-3 py-2 rounded-xl flex items-center gap-1 active:scale-95"><i class="ph-bold ph-funnel"></i> Filter</button>
          </div>

          <div class="bg-white rounded-2xl shadow-soft p-1 border border-gray-50 flex gap-1">
            <button @click="setReportFilter('all')" :class="reportFilter.mode==='all' ? 'bg-primary text-white shadow-sm' : 'text-gray-500'" class="flex-1 py-2 text-sm font-semibold rounded-xl transition-colors">Semua</button>
            <button @click="setReportFilter('today')" :class="reportFilter.mode==='today' ? 'bg-primary text-white shadow-sm' : 'text-gray-500'" class="flex-1 py-2 text-sm font-semibold rounded-xl transition-colors">Hari Ini</button>
            <button @click="setReportFilter('range')" :class="reportFilter.mode==='range' ? 'bg-primary text-white shadow-sm' : 'text-gray-500'" class="flex-1 py-2 text-sm font-semibold rounded-xl transition-colors">Tgl</button>
          </div>

          <div class="bg-white p-5 rounded-3xl shadow-soft border border-gray-50">
            <h3 class="text-sm font-bold text-gray-500 mb-4">Ringkasan Laba Rugi</h3>
            <div class="space-y-3">
              <div class="flex justify-between items-center pb-3 border-b border-gray-100">
                <span class="text-sm text-gray-600">Omzet Penjualan</span><span class="font-bold text-secondary">Rp {{ formatCurrency(filteredReport.omzet) }}</span>
              </div>
              <div class="flex justify-between items-center pb-3 border-b border-gray-100">
                <span class="text-sm text-gray-600">Total HPP (Modal Barang)</span><span class="font-bold text-red-500">- Rp {{ formatCurrency(filteredReport.hpp) }}</span>
              </div>
              <div class="flex justify-between items-center pb-3 border-b border-gray-100">
                <span class="text-sm text-gray-600">Total Pengeluaran</span><span class="font-bold text-red-500">- Rp {{ formatCurrency(filteredReport.pengeluaran) }}</span>
              </div>
              <div class="flex justify-between items-center pt-2">
                <span class="font-bold text-secondary">Laba Bersih</span><span class="font-extrabold text-lg" :class="filteredReport.isMinus ? 'text-red-500' : 'text-success'">Rp {{ formatCurrency(filteredReport.labaBersih) }}</span>
              </div>
            </div>
          </div>

          <div>
            <div class="flex gap-4 border-b border-gray-200 mb-4">
              <button @click="historyTab = 'trx'" :class="historyTab === 'trx' ? 'border-b-2 border-primary text-primary font-bold' : 'text-gray-400 font-medium'" class="pb-2 text-sm transition-all flex items-center gap-1"><i class="ph-bold ph-receipt"></i> Transaksi</button>
              <button @click="historyTab = 'exp'" :class="historyTab === 'exp' ? 'border-b-2 border-primary text-primary font-bold' : 'text-gray-400 font-medium'" class="pb-2 text-sm transition-all flex items-center gap-1"><i class="ph-bold ph-hand-coins"></i> Pengeluaran</button>
            </div>

            <div v-if="historyTab === 'trx'" class="space-y-3 animate-fade-in">
              <div v-for="trx in filteredTransactions" :key="trx.id" class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex flex-col gap-3">
                <div class="flex justify-between items-start">
                  <div class="flex-1 pr-2">
                    <p class="text-[10px] text-gray-400">{{ formatDateTime(trx.tanggal) }}</p>
                    <p class="font-bold text-secondary text-sm mt-0.5">{{ trx.customerName || 'Pelanggan Umum' }}</p>
                    <p class="text-[10px] text-primary bg-primary/10 px-2 py-0.5 rounded-md inline-block mt-1 font-semibold">{{ trx.metodeBayar }}</p>
                    
                    <div class="text-[10px] text-gray-500 mt-2 line-clamp-2 leading-tight w-full max-w-[200px]">
                      <span v-for="(it, i) in (trx.items ? parseItems(trx.items) : [])" :key="i">
                        {{ it.name }} ({{ it.qty }})<template v-if="i < parseItems(trx.items).length - 1">, </template>
                      </span>
                    </div>

                  </div>
                  <div class="text-right">
                    <p class="font-bold text-success text-sm">+ Rp {{ formatCurrency(trx.total) }}</p>
                  </div>
                </div>

    <nav class="glass-nav flex justify-around px-2 py-3 fixed bottom-0 left-0 right-0 w-full max-w-md mx-auto z-30 shadow-[0_-4px_20px_-1px_rgba(0,0,0,0.05)] rounded-t-3xl">

    <div v-if="showCartModal" class="fixed inset-0 bg-secondary/80 z-50 flex items-end justify-center backdrop-blur-sm" @click.self="showCartModal=false">

            <button @click="showCartModal=false" class="bg-gray-100 text-gray-600 p-2 rounded-xl active:scale-90"><i class="ph-bold ph-x"></i></button>

        <div class="space-y-2 mb-4 shrink-0">

          <div v-for="(item, idx) in formExpense.items" :key="idx" class="flex gap-2 items-start relative bg-gray-50 p-3 rounded-2xl border border-gray-100 animate-fade-in">
            <div class="flex-1 space-y-2">
              <input v-model="item.keterangan" type="text" placeholder="Cth: Telur 2kg" class="w-full border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-red-500 text-sm bg-white">
              <div class="flex items-center gap-2">
                <span class="text-sm font-bold text-gray-400">Rp</span>
                <input v-model.number="item.nominal" type="number" placeholder="0" class="w-full border border-gray-200 rounded-xl px-3 py-2 outline-none focus:border-red-500 text-sm bg-white font-bold text-red-600">
              </div>
            </div>
            <button v-if="formExpense.items.length > 1" @click="removeExpenseItem(idx)" class="bg-white border border-gray-200 text-red-400 hover:text-red-600 w-8 h-8 rounded-full flex items-center justify-center absolute -top-2 -right-2 shadow-sm active:scale-90"><i class="ph-bold ph-trash"></i></button>
          </div>
          <button @click="addExpenseItem" class="text-red-500 bg-red-50 px-4 py-2 rounded-xl text-xs font-bold w-full active:scale-95 transition-all"><i class="ph-bold ph-plus"></i> Tambah Item Lain</button>
        </div>

        <div class="shrink-0 space-y-4">
          <div class="flex justify-between items-center bg-red-50 p-4 rounded-2xl border border-red-100">
            <span class="text-sm font-bold text-red-600">Total Tagihan:</span>
            <span class="text-xl font-black text-red-600">Rp {{ formatCurrency(expenseTotal) }}</span>
          </div>
          <button @click="saveExpense" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold active:scale-95 shadow-md flex items-center justify-center gap-2"><i class="ph-bold ph-floppy-disk text-lg"></i> Simpan Laporan</button>
        </div>
      </div>
    </div>

    <div v-if="showDateFilterModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm" @click.self="showDateFilterModal=false">
      <div class="bg-white rounded-3xl w-full max-w-sm p-6 animate-slide-up shadow-2xl">
        <h3 class="font-extrabold text-lg mb-4 text-center">Filter Berdasarkan Tanggal</h3>
        <div class="space-y-4">
          <div><label class="text-xs text-gray-500 font-bold mb-1 block">Mode</label><select v-model="dateFilter.mode" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm bg-gray-50"><option value="single">Tanggal Tunggal</option><option value="range">Rentang Tanggal</option></select></div>
          <div><label class="text-xs text-gray-500 font-bold mb-1 block">Tanggal Awal</label><input v-model="dateFilter.start" type="date" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm bg-gray-50"></div>
          <div v-if="dateFilter.mode === 'range'"><label class="text-xs text-gray-500 font-bold mb-1 block">Tanggal Akhir</label><input v-model="dateFilter.end" type="date" class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm bg-gray-50"></div>
          <div class="grid grid-cols-2 gap-3 pt-2">
            <button @click="resetDateFilter" class="bg-gray-100 text-gray-600 py-3 rounded-xl font-bold active:scale-95">Reset</button>
            <button @click="applyDateFilter" class="bg-primary text-white py-3 rounded-xl font-bold active:scale-95">Terapkan</button>
          </div>
        </div>
      </div>

  </template>
</div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted } = Vue;

createApp({
  setup() {
    const isLoadingSystem = ref(true);
    const systemError = ref('');
    const isLoggedIn = ref(false);
    const pin = ref('');
    const loginError = ref('');
    const currentTab = ref('dashboard');
    const historyTab = ref('trx');
    const showCartModal = ref(false);
    const showProductModal = ref(false);
    const showExpenseModal = ref(false);
    const showDateFilterModal = ref(false);
    const isSavingSettings = ref(false);
    const isSyncing = ref(false); 
    const syncInterval = ref(null); 

    const cart = ref([]);
    const transactions = ref([]);
    const expenses = ref([]);
    const products = ref([]);
    const searchQuery = ref('');
    const activeCategory = ref('Semua');
    const categories = ref(['Semua', 'Makanan', 'Minuman', 'Cemilan', 'Paket', 'Lainnya']);
    const reportFilter = ref({ mode: 'today', start: '', end: '' });
    const dateFilter = ref({ mode: 'single', start: '', end: '' });

    const customer = ref({ name: '', phone: '' });
    const diskon = ref(0);
    const metodeBayar = ref('Cash');
    const catatanOrder = ref('');

    const storeProfile = ref({ name: 'WarungKas', phone: '', logo: '' });
    const formSettings = ref({ namawarung: 'WarungKas', nowawarung: '', alamat: '', pesanfooter: 'Terima kasih sudah jajan!', pin: '1234', logo: '' });
    const activePin = ref('1234');
    const formProduct = ref({ id: null, name: '', category: 'Makanan', price: 0, hpp: 0, icon: '📦', status: 'aktif' });
    const formExpense = ref({ kategori: 'Bahan Baku', items: [{ keterangan: '', nominal: null }] });

    const liveClock = ref('');
    const currentDateTime = ref('');
    const tabs = ['dashboard', 'kasir', 'produk', 'laporan', 'pengaturan'];

    const toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 2200, timerProgressBar: true });
    const notify = (icon, title) => toast.fire({ icon, title });

    const confirmAction = async (title, text) => {
      const r = await Swal.fire({ title, text, icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya', cancelButtonText: 'Batal' });
      return r.isConfirmed;
    };

    // Fungsi pembuat UUID (Mencegah Tabrakan Saat Transaksi Bersamaan)
    const generateId = (prefix) => {
      return prefix + '-' + Date.now() + '-' + Math.random().toString(36).substring(2, 7).toUpperCase();
    };

    const updateClock = () => { 
      const now = new Date();
      liveClock.value = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); 
      currentDateTime.value = now.toLocaleString('id-ID', { dateStyle: 'full', timeStyle: 'short' }); 
    };

    const formatCurrency = (val) => new Intl.NumberFormat('id-ID').format(Number(val || 0));
    const formatDateTime = (val) => { if (!val) return '-'; return new Date(val).toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' }); };
    
    const getTabIcon = (tab) => {
      const map = { dashboard: 'ph-house', kasir: 'ph-calculator', produk: 'ph-package', laporan: 'ph-chart-pie-slice', pengaturan: 'ph-gear' };
      return map[tab] || 'ph-circle';
    };

    const changeTab = (tab) => { currentTab.value = tab; searchQuery.value = ''; activeCategory.value = 'Semua'; };

    // =========================================================
    // API CALL KE GOOGLE APPS SCRIPT
    // =========================================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx6iOiW76esvubkiSw_htBefvebwUaM1CrUBwgwGuu80QQJOB2Rrf4WSSM5JgmSP4F0/exec';

    const callApi = async (action, payload = {}) => {
      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8',
          },
          body: JSON.stringify({ action: action, payload: payload })
        });
        return await response.json();
      } catch (error) {
        console.error('API Error:', error);
        throw error;
      }
    };

    const parseItems = (items) => {
      if (Array.isArray(items)) return items;
      try { return typeof items === 'string' ? JSON.parse(items || '[]') : []; } catch(e) { return []; }
    };

    const syncData = async (silent = true) => {
      if (isSyncing.value) return;
      isSyncing.value = true;
      try {
        const res = await callApi('GET_ALL_DATA');
        if (res && res.success) {
          products.value = res.data.products || products.value;
          transactions.value = (res.data.transactions || transactions.value).map(t => ({...t, items: parseItems(t.items)}));
          expenses.value = res.data.expenses || expenses.value;
          
          localStorage.setItem('wkprod', JSON.stringify(products.value));
          localStorage.setItem('wktrx', JSON.stringify(transactions.value));
          localStorage.setItem('wkexp', JSON.stringify(expenses.value));

          if (!silent) notify('success', 'Data tersinkronisasi!');
        }
      } catch (e) {
        if (!silent) notify('error', 'Gagal menyinkronkan data.');
      } finally {
        isSyncing.value = false;
      }
    };

    const forceSync = () => syncData(false);

    const loadData = async () => {
      isLoadingSystem.value = true; systemError.value = '';
      try {
        const savedTrx = localStorage.getItem('wktrx'); const savedExp = localStorage.getItem('wkexp');
        const savedProd = localStorage.getItem('wkprod'); const savedSettings = localStorage.getItem('wksettings');

        if (savedTrx) transactions.value = JSON.parse(savedTrx).map(t => ({...t, items: parseItems(t.items)}));
        if (savedExp) expenses.value = JSON.parse(savedExp);
        if (savedProd) products.value = JSON.parse(savedProd);
        else products.value = [{ id: generateId('PRD'), name: 'Sosis Bakar Besar', category: 'Cemilan', price: 12000, hpp: 6000, icon: '🌭', status: 'aktif' }];
        
        if (savedSettings) {
          const s = JSON.parse(savedSettings); formSettings.value = { ...formSettings.value, ...s };
          storeProfile.value.name = s.namawarung || storeProfile.value.name; storeProfile.value.phone = s.nowawarung || ''; storeProfile.value.logo = s.logo || '';
          activePin.value = String(s.pin || activePin.value);
        }

        await syncData(true);
        isLoadingSystem.value = false;
      } catch (e) { systemError.value = e.message || 'Gagal memuat API'; isLoadingSystem.value = false; }
    };

    const retryLoad = () => loadData();
    const appendPin = (n) => {
      if (pin.value.length >= 4) return; pin.value += String(n); loginError.value = '';
      if (pin.value.length === 4) {
        setTimeout(() => {
          if (pin.value === String(activePin.value)) { isLoggedIn.value = true; notify('success', 'Login berhasil'); } 
          else { loginError.value = 'PIN Salah!'; pin.value = ''; }
        }, 150);
      }
    };
    const removePin = () => { pin.value = pin.value.slice(0, -1); }; const clearPin = () => { pin.value = ''; };
    const logout = async () => { const ok = await confirmAction('Keluar kasir?', 'Anda akan kembali ke layar login.'); if (!ok) return; isLoggedIn.value = false; pin.value = ''; currentTab.value = 'dashboard'; };

    const availableCategories = computed(() => { const base = ['Makanan', 'Minuman', 'Cemilan', 'Paket', 'Lainnya']; const fromProducts = products.value.map(p => p.category).filter(Boolean); return [...new Set([...base, ...fromProducts])]; });
    const filteredProducts = computed(() => { return products.value.filter(p => { const catOk = activeCategory.value === 'Semua' || p.category === activeCategory.value; const searchOk = p.name.toLowerCase().includes(searchQuery.value.toLowerCase()); const statusOk = p.status !== 'nonaktif'; return catOk && searchOk && statusOk; }); });
    const filteredCatalog = computed(() => { return products.value.filter(p => p.name.toLowerCase().includes(searchQuery.value.toLowerCase())); });

    const addToCart = (product) => { const item = cart.value.find(i => i.id === product.id); if (item) item.qty += 1; else cart.value.push({ ...product, qty: 1 }); notify('success', `${product.name} ditambahkan`); };
    const getCartQty = (id) => { const item = cart.value.find(i => i.id === id); return item ? item.qty : 0; };
    const updateQtyById = (id, delta) => { const idx = cart.value.findIndex(i => i.id === id); if(idx !== -1) updateQty(idx, delta); };
    const updateQty = (idx, delta) => { const item = cart.value[idx]; if (!item) return; item.qty += delta; if (item.qty <= 0) cart.value.splice(idx, 1); if (!cart.value.length) showCartModal.value = false; };
    const clearCart = () => { Swal.fire({ title: 'Batalkan Transaksi?', text: 'Semua pesanan di keranjang akan dihapus.', icon: 'warning', showCancelButton: true, confirmButtonColor: '#ef4444', cancelButtonColor: '#f3f4f6', cancelButtonText: '<span style="color:black">Tidak</span>', confirmButtonText: 'Ya, Batalkan' }).then((r) => { if (r.isConfirmed) { cart.value = []; customer.value = { name: '', phone: '' }; diskon.value = 0; catatanOrder.value = ''; showCartModal.value = false; notify('info', 'Transaksi dibatalkan'); } }); };

    const cartSubtotal = computed(() => cart.value.reduce((s, i) => s + Number(i.price || 0) * Number(i.qty || 0), 0));
    const cartHppTotal = computed(() => cart.value.reduce((s, i) => s + Number(i.hpp || 0) * Number(i.qty || 0), 0));
    const cartTotal = computed(() => Math.max(0, cartSubtotal.value - Number(diskon.value || 0)));
    const cartTotalItems = computed(() => cart.value.reduce((s, i) => s + Number(i.qty || 0), 0));

    const isWithinFilter = (dateStr) => {
      const d = new Date(dateStr); if (reportFilter.value.mode === 'today') { return d.toDateString() === new Date().toDateString(); }
      if (reportFilter.value.mode === 'range' && reportFilter.value.start) { const start = new Date(reportFilter.value.start); const end = new Date(reportFilter.value.end || reportFilter.value.start); end.setHours(23, 59, 59, 999); return d >= start && d <= end; } return true;
    };

    const filteredTransactions = computed(() => [...transactions.value].filter(t => isWithinFilter(t.tanggal)).reverse());
    const filteredExpenses = computed(() => [...expenses.value].filter(e => isWithinFilter(e.tanggal)).reverse());

    const filteredReport = computed(() => {
      let omzet = 0, hpp = 0, pengeluaran = 0;
      filteredTransactions.value.forEach(t => { omzet += Number(t.total || 0); hpp += Number(t.hppTotal || 0); });
      filteredExpenses.value.forEach(e => { pengeluaran += Number(e.nominal || 0); });
      const labaBersih = omzet - hpp - pengeluaran;
      return { omzet, hpp, pengeluaran, labaBersih, isMinus: labaBersih < 0, labaKotor: omzet - hpp };
    });

    const dashboardStats = computed(() => {
      const today = new Date().toDateString(); const trxToday = transactions.value.filter(t => new Date(t.tanggal).toDateString() === today);
      return { omzet: filteredReport.value.omzet, labaKotor: filteredReport.value.labaKotor, totalPengeluaran: filteredReport.value.pengeluaran, isLabaMinus: filteredReport.value.isMinus, totalTrx: reportFilter.value.mode === 'today' ? trxToday.length : filteredTransactions.value.length };
    });

    const topSoldToday = computed(() => {
      const trxs = filteredTransactions.value;
      const itemMap = {};
      trxs.forEach(t => {
        const parsed = parseItems(t.items);
        parsed.forEach(i => { 
          if (!itemMap[i.name]) itemMap[i.name] = { name: i.name, qty: 0 }; 
          itemMap[i.name].qty += Number(i.qty || 0); 
        });
      });
      const sorted = Object.values(itemMap).sort((a, b) => b.qty - a.qty).slice(0, 5);
      const maxQty = sorted.length ? Math.max(...sorted.map(x => x.qty)) : 0;
      return sorted.map(x => ({ ...x, pct: maxQty > 0 ? (x.qty / maxQty) * 100 : 0 }));
    });

    const dashboardInsight = computed(() => {
      if (reportFilter.value.mode !== 'today') { return `Menampilkan data dari periode terpilih. Total ${dashboardStats.value.totalTrx} transaksi.`; }
      const omzet = dashboardStats.value.omzet; const trx = dashboardStats.value.totalTrx;
      if (trx === 0) return "Belum ada transaksi hari ini, ayo semangat jualan! 💪";
      if (dashboardStats.value.isLabaMinus) return `Omzet Rp ${formatCurrency(omzet)}, tapi laba bersih minus. Cek kembali pengeluaran Anda ya. 📉`;
      if (trx > 10) return `Luar biasa! Hari ini tembus ${trx} transaksi dengan omzet Rp ${formatCurrency(omzet)}. Pertahankan! 🚀`;
      return `Hari ini sudah ada ${trx} transaksi masuk (Rp ${formatCurrency(omzet)}). Yuk gas lagi biar makin cuan! 🔥`;
    });

    const setReportFilter = (mode) => { reportFilter.value.mode = mode; if (mode !== 'range') { reportFilter.value.start = ''; reportFilter.value.end = ''; } };
    const openDateFilter = () => { showDateFilterModal.value = true; dateFilter.value.mode = 'single'; dateFilter.value.start = ''; dateFilter.value.end = ''; };
    const applyDateFilter = () => { if (!dateFilter.value.start) { notify('error', 'Tanggal belum dipilih'); return; } reportFilter.value.mode = 'range'; reportFilter.value.start = dateFilter.value.start; reportFilter.value.end = dateFilter.value.mode === 'range' ? (dateFilter.value.end || dateFilter.value.start) : dateFilter.value.start; showDateFilterModal.value = false; notify('success', 'Filter tanggal diterapkan'); };
    const resetDateFilter = () => { reportFilter.value = { mode: 'all', start: '', end: '' }; showDateFilterModal.value = false; notify('success', 'Filter direset'); };

    const generateWAURL = () => { let text = storeProfile.value.name.toUpperCase() + '\n'; text += new Date().toLocaleString('id-ID') + '\n'; text += '-----------------------------\n'; cart.value.forEach(item => { text += '- ' + item.name + ' ' + item.qty + ' x Rp ' + formatCurrency(item.price * item.qty) + '\n'; }); text += '-----------------------------\n'; if (diskon.value > 0) text += 'Diskon: -Rp ' + formatCurrency(diskon.value) + '\n'; text += 'TOTAL: Rp ' + formatCurrency(cartTotal.value) + '\n'; text += '-----------------------------\n'; text += formSettings.value.pesanfooter + '\nTerima kasih!'; let targetNum = customer.value.phone || storeProfile.value.phone || ''; if (targetNum.startsWith('0')) targetNum = '62' + targetNum.substring(1); else if (!targetNum.startsWith('62')) targetNum = '62' + targetNum; return 'https://wa.me/' + targetNum + '?text=' + encodeURIComponent(text); };
    
    const processPayment = async (type) => {
      if (!cart.value.length) { notify('error', 'Keranjang masih kosong'); return; }
      
      const payload = { 
        tanggal: new Date().toISOString(), 
        customerName: customer.value.name, 
        customerPhone: customer.value.phone, 
        subtotal: cartSubtotal.value, 
        diskon: Number(diskon.value || 0), 
        total: cartTotal.value, 
        hppTotal: cartHppTotal.value, 
        metodeBayar: metodeBayar.value, 
        bayar: cartTotal.value, 
        kembalian: 0, 
        catatan: catatanOrder.value, 
        items: cart.value.map(i => ({ id: i.id, name: i.name, qty: Number(i.qty), price: Number(i.price), hpp: Number(i.hpp || 0) })) 
      };
      
      // Gunakan generateId() yang jauh lebih aman dari collision
      const tempId = generateId('TRX'); 
      transactions.value.push({ ...payload, id: tempId }); 
      localStorage.setItem('wktrx', JSON.stringify(transactions.value));
      
      callApi('SAVE_TRANSACTION', { ...payload, id: tempId }).then(() => { syncData(true); });
      
      if (type === 'wa') window.open(generateWAURL(), '_blank');
      cart.value = []; customer.value = { name: '', phone: '' }; diskon.value = 0; metodeBayar.value = 'Cash'; catatanOrder.value = ''; showCartModal.value = false; changeTab('dashboard'); notify('success', 'Transaksi berhasil disimpan');
    };

    const deleteTransaction = async (id) => { const ok = await confirmAction('Hapus transaksi?', 'Data tidak bisa dikembalikan.'); if (!ok) return; transactions.value = transactions.value.filter(t => t.id !== id); localStorage.setItem('wktrx', JSON.stringify(transactions.value)); callApi('DELETE_TRANSACTION', { id }).then(()=> syncData(true)); notify('success', 'Transaksi dihapus'); };
    const editTransaction = (trx) => { Swal.fire({ title: 'Edit (Retur) Struk?', text: 'Struk ini akan dibatalkan, lalu barangnya dikembalikan ke Keranjang.', icon: 'question', showCancelButton: true, confirmButtonColor: '#3b82f6', confirmButtonText: 'Ya, Ubah Pesanan' }).then(r => { if(r.isConfirmed) { transactions.value = transactions.value.filter(t => t.id !== trx.id); localStorage.setItem('wktrx', JSON.stringify(transactions.value)); callApi('DELETE_TRANSACTION', { id: trx.id }).then(()=> syncData(true)); cart.value = [...parseItems(trx.items)]; customer.value = { name: trx.customerName || '', phone: trx.customerPhone || '' }; diskon.value = trx.diskon || 0; metodeBayar.value = trx.metodeBayar || 'Cash'; catatanOrder.value = trx.catatan || ''; changeTab('kasir'); notify('info', 'Silakan ubah pesanan di Keranjang'); } }); };

    const openProductModal = (p = null) => { formProduct.value = p ? { ...p } : { id: null, name: '', category: 'Makanan', price: 0, hpp: 0, icon: '📦', status: 'aktif' }; showProductModal.value = true; };
    const saveProduct = async () => { if (!formProduct.value.name || Number(formProduct.value.price) <= 0) { notify('error', 'Nama dan harga wajib diisi'); return; } const payload = { ...formProduct.value }; if (!payload.id) payload.id = generateId('PRD'); const idx = products.value.findIndex(x => x.id === payload.id); if (idx !== -1) products.value[idx] = { ...payload }; else products.value.push({ ...payload }); localStorage.setItem('wkprod', JSON.stringify(products.value)); callApi('SAVE_PRODUCT', payload).then(()=> syncData(true)); showProductModal.value = false; notify('success', 'Menu berhasil disimpan'); };
    const deleteProduct = async (id) => { const ok = await confirmAction('Hapus produk?', 'Produk akan dihapus dari daftar.'); if (!ok) return; products.value = products.value.filter(p => p.id !== id); localStorage.setItem('wkprod', JSON.stringify(products.value)); callApi('DELETE_PRODUCT', { id }).then(()=> syncData(true)); showProductModal.value = false; notify('success', 'Produk dihapus'); };

    const addExpenseItem = () => formExpense.value.items.push({ keterangan: '', nominal: null });
    const removeExpenseItem = (idx) => formExpense.value.items.splice(idx, 1);
    const expenseTotal = computed(() => formExpense.value.items.reduce((s, i) => s + Number(i.nominal || 0), 0));

    const saveExpense = () => {
      const validItems = formExpense.value.items.filter(i => i.keterangan && Number(i.nominal) > 0);
      if (validItems.length === 0) return notify('error', 'Masukkan minimal 1 pengeluaran');
      const baseTanggal = new Date();
      validItems.forEach((item, index) => {
        const d = new Date(baseTanggal.getTime() + index * 1000); 
        const payload = { id: generateId('EXP'), tanggal: d.toISOString(), kategori: formExpense.value.kategori, nominal: Number(item.nominal), keterangan: item.keterangan };
        expenses.value.push(payload);
        callApi('SAVE_EXPENSE', payload).then(()=> syncData(true)); 
      });
      localStorage.setItem('wkexp', JSON.stringify(expenses.value));
      formExpense.value = { kategori: 'Bahan Baku', items: [{ keterangan: '', nominal: null }] };
      showExpenseModal.value = false;
      notify('success', `${validItems.length} Pengeluaran dicatat`);
    };

    const deleteExpense = async (id) => { const ok = await confirmAction('Hapus pengeluaran?', 'Data pengeluaran akan dihapus permanen.'); if (!ok) return; expenses.value = expenses.value.filter(e => e.id !== id); localStorage.setItem('wkexp', JSON.stringify(expenses.value)); callApi('DELETE_EXPENSE', { id }).then(()=> syncData(true)); notify('success', 'Pengeluaran dihapus'); };

    const saveSettings = async () => { if (String(formSettings.value.pin).length !== 4 || isNaN(Number(formSettings.value.pin))) { notify('error', 'PIN harus 4 digit angka'); return; } isSavingSettings.value = true; try { const payload = { ...formSettings.value, pin: String(formSettings.value.pin) }; storeProfile.value.name = payload.namawarung; storeProfile.value.phone = payload.nowawarung; storeProfile.value.logo = payload.logo; activePin.value = payload.pin; localStorage.setItem('wksettings', JSON.stringify(payload)); callApi('SAVE_SETTINGS', payload).then(()=> syncData(true)); notify('success', 'Pengaturan disimpan'); } finally { isSavingSettings.value = false; } };
    
    const exportDataExcel = () => { const wb = XLSX.utils.book_new(); const wsProducts = XLSX.utils.json_to_sheet(products.value); const wsTransactions = XLSX.utils.json_to_sheet(transactions.value.map(t => ({ ...t, items: JSON.stringify(t.items || []) }))); const wsExpenses = XLSX.utils.json_to_sheet(expenses.value); XLSX.utils.book_append_sheet(wb, wsProducts, 'Products'); XLSX.utils.book_append_sheet(wb, wsTransactions, 'Transactions'); XLSX.utils.book_append_sheet(wb, wsExpenses, 'Expenses'); const fileName = 'WarungKas_Backup_' + Date.now() + '.xlsx'; XLSX.writeFile(wb, fileName); notify('success', 'Export Excel berhasil'); };
    const importDataExcel = async (e) => { const file = e.target.files[0]; if (!file) return; try { const data = await file.arrayBuffer(); const wb = XLSX.read(data, { type: 'array' }); if (wb.SheetNames.includes('Products')) { products.value = XLSX.utils.sheet_to_json(wb.Sheets['Products']); } if (wb.SheetNames.includes('Transactions')) { transactions.value = XLSX.utils.sheet_to_json(wb.Sheets['Transactions']).map(t => ({ ...t, items: parseItems(t.items) })); } if (wb.SheetNames.includes('Expenses')) { expenses.value = XLSX.utils.sheet_to_json(wb.Sheets['Expenses']); } localStorage.setItem('wkprod', JSON.stringify(products.value)); localStorage.setItem('wktrx', JSON.stringify(transactions.value)); localStorage.setItem('wkexp', JSON.stringify(expenses.value)); syncData(true); notify('success', 'Import Excel berhasil'); } catch (err) { notify('error', 'File Excel tidak valid'); } finally { e.target.value = ''; } };
    
    const handleLogoUpload = (e) => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (event) => { const img = new Image(); img.onload = () => { const canvas = document.createElement('canvas'); const MAX_WIDTH = 250; const scaleSize = MAX_WIDTH / img.width; canvas.width = MAX_WIDTH; canvas.height = img.height * scaleSize; const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height); formSettings.value.logo = canvas.toDataURL('image/jpeg', 0.8); notify('success', 'Foto berhasil dipilih'); }; img.src = event.target.result; }; reader.readAsDataURL(file); };

    const handleVisibilityChange = () => {
      if (document.visibilityState === 'visible') {
        syncData(true);
      }
    };

    onMounted(() => { 
      loadData(); 
      updateClock(); 
      setInterval(updateClock, 1000); 
      
      syncInterval.value = setInterval(() => {
        syncData(true);
      }, 15000);

      document.addEventListener('visibilitychange', handleVisibilityChange);
    });

    onUnmounted(() => {
      clearInterval(syncInterval.value);
      document.removeEventListener('visibilitychange', handleVisibilityChange);
    });

    return {
      isLoadingSystem, systemError, retryLoad, isLoggedIn, pin, loginError, appendPin, removePin, clearPin, logout,
      currentTab, historyTab, changeTab, getTabIcon, currentDateTime, liveClock, formatCurrency, formatDateTime, cart, addToCart, getCartQty, updateQty, updateQtyById, clearCart,
      cartTotalItems, cartSubtotal, cartTotal, diskon, metodeBayar, catatanOrder, processPayment, customer, parseItems,
      showCartModal, products, filteredProducts, filteredCatalog, searchQuery, activeCategory, categories, availableCategories, showProductModal, openProductModal, saveProduct, deleteProduct, formProduct,
      showExpenseModal, formExpense, saveExpense, deleteExpense, addExpenseItem, removeExpenseItem, expenseTotal, dashboardInsight,
      reportFilter, filteredReport, filteredTransactions, filteredExpenses, dashboardStats, topSoldToday,
      storeProfile, formSettings, saveSettings, isSavingSettings, exportDataExcel, importDataExcel, handleLogoUpload,
      setReportFilter, openDateFilter, showDateFilterModal, dateFilter, applyDateFilter, resetDateFilter, tabs, deleteTransaction, editTransaction,
      isSyncing, forceSync
    };
  }
}).mount('#app');
</script>
